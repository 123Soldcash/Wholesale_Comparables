name: Fetch Property Comps

on:
  # Trigger manually from GitHub with an address input
  workflow_dispatch:
    inputs:
      address:
        description: 'Property address (e.g. 438 NE 2nd St, Pompano Beach, FL 33060)'
        required: true
        default: '438 NE 2nd St, Pompano Beach, FL 33060'
      street_view_key:
        description: 'Google Street View API key (optional)'
        required: false
        default: ''

  # Also trigger when a file called "analyze_request.txt" is pushed
  push:
    paths:
      - 'analyze_request.txt'

jobs:
  fetch-comps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Get address from input or file
        id: get-address
        run: |
          if [ -n "${{ github.event.inputs.address }}" ]; then
            echo "ADDRESS=${{ github.event.inputs.address }}" >> $GITHUB_ENV
          elif [ -f "analyze_request.txt" ]; then
            echo "ADDRESS=$(cat analyze_request.txt)" >> $GITHUB_ENV
          else
            echo "ADDRESS=438 NE 2nd St, Pompano Beach, FL 33060" >> $GITHUB_ENV
          fi

      - name: Run property analysis
        run: |
          python fetch_comps.py "${{ env.ADDRESS }}" \
            --output comps_result.json \
            --street-view-key "${{ github.event.inputs.street_view_key || '' }}"

      - name: Save results to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "123SoldCash Bot"
          git add comps_result.json
          git diff --staged --quiet || git commit -m "Comps: ${{ env.ADDRESS }}"
          git push
