<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>123SoldCash — Wholesale Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0f2244; --blue:#1a5cdb; --blue-bg:#eef4ff; --blue-bd:#c0d4ff;
  --orange:#e07b1a; --orange-bg:#fff4e6; --orange-bd:#fcd4a0;
  --green:#16a34a; --green-bg:#f0fdf4; --green-bd:#bbf7d0;
  --red:#dc2626; --red-bg:#fef2f2; --red-bd:#fecaca;
  --amber-bg:#fffbeb; --amber:#92400e; --amber-bd:#fde68a;
  --g1:#f8f9fb; --g2:#f0f2f6; --g3:#e2e6ed; --g4:#9aa3b2; --g5:#6b7280;
  --tx:#1a1f2e; --tx2:#4b5568; --wh:#fff;
  --sh:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--g1);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.topbar{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-weight:700;font-size:15px;color:#fff}.logo span{color:#f5a443}
.topbar-r{display:flex;align-items:center;gap:10px}
.badge-on{font-size:11px;color:#4ade80;display:flex;align-items:center;gap:5px;background:rgba(74,222,128,.1);padding:3px 10px;border-radius:20px;border:1px solid rgba(74,222,128,.2)}
.btn-xs{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#a8c4e8;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-decoration:none;display:inline-block}
.btn-xs:hover{background:rgba(255,255,255,.18);color:#fff}
/* SETUP */
.setup{max-width:520px;margin:52px auto;padding:0 16px}
.scard{background:var(--wh);border:1px solid var(--g3);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.sh{background:var(--navy);padding:24px 28px}
.sh h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:5px}
.sh p{font-size:12px;color:#7fa8d8;line-height:1.6}
.sb{padding:28px}
.ibox{background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:12px;color:#1e40af;line-height:1.7}
.wbox{background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:8px;padding:11px 13px;margin-bottom:18px;font-size:11px;color:#7a4500}
.wbox strong{color:var(--orange)}
.field{margin-bottom:18px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.field input{width:100%;padding:9px 13px;border:1.5px solid var(--g3);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border-color .2s;background:var(--g1)}
.field input:focus{border-color:var(--blue);background:#fff}
.field input::placeholder{color:#b0b8c8}
.hint{font-size:11px;color:var(--g4);margin-top:4px;line-height:1.5}
.hint a{color:var(--blue)}
.err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}
.btn-connect{width:100%;background:var(--blue);color:#fff;border:none;padding:12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-connect:hover{background:#1448b8}
.btn-connect:disabled{background:var(--g4);cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--g4);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;border-top:1px solid var(--g3)}
.btn-skip{width:100%;background:var(--g2);color:var(--tx2);border:1px solid var(--g3);padding:10px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-skip:hover{background:var(--g3)}
/* SBAR */
.sbar{background:var(--wh);border-bottom:1px solid var(--g3);padding:10px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.slabel{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.swrap{flex:1;min-width:200px;position:relative}
.swrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--g4)}
.sinput{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--g3);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;background:var(--g1)}
.sinput:focus{border-color:var(--blue);background:#fff}
.sinput::placeholder{color:#b0b8c8}
.btn-go{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-go:hover{background:#1448b8}
.btn-go:disabled{background:var(--g4);cursor:not-allowed}
.btn-sec{background:var(--g2);color:var(--tx2);border:1px solid var(--g3);padding:7px 12px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-sec:hover{background:var(--g3)}
.btn-gh{background:var(--navy);color:#fff;border:none;padding:7px 14px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn-gh:hover{background:#1a3a6b}
.btn-load{background:var(--green);color:#fff;border:none;padding:7px 14px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .15s}
.btn-load:hover{background:#15803d}
/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:18px 18px 60px}
/* IDLE */
.idle{text-align:center;padding:52px 20px;background:var(--wh);border:1px solid var(--g3);border-radius:10px;box-shadow:var(--sh)}
.idle-icon{font-size:44px;margin-bottom:14px}
.idle h3{font-size:17px;font-weight:600;color:var(--tx);margin-bottom:10px}
.idle p{font-size:13px;color:var(--tx2);max-width:500px;margin:0 auto 24px;line-height:1.8}
.flow-steps{display:flex;gap:0;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.fs{display:flex;align-items:center;gap:0}
.fs-box{background:var(--g2);border:1px solid var(--g3);border-radius:8px;padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);white-space:nowrap}
.fs-arrow{color:var(--g4);font-size:18px;margin:0 6px}
.idle-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.chip{background:var(--g2);border:1px solid var(--g3);color:var(--tx2);font-size:11px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .15s}
.chip:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
/* CARDS */
.card{background:var(--wh);border:1px solid var(--g3);border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)}
.card-head{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--g3);background:var(--g1)}
.cicon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ci-b{background:var(--blue-bg)}.ci-g{background:var(--green-bg)}.ci-o{background:var(--orange-bg)}.ci-r{background:var(--red-bg)}
.card-title{font-size:13px;font-weight:600;color:var(--tx);flex:1}
.card-sub{font-size:11px;color:var(--g4)}
.dm-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;padding:2px 8px;border-radius:10px}
/* PROP */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}
.pc{padding:12px 15px;border-right:1px solid var(--g3);border-bottom:1px solid var(--g3)}
.pl{font-size:10px;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.pv{font-size:13px;font-weight:500;color:var(--tx)}
.pv.blue{color:var(--blue)}.pv.green{color:var(--green)}.pv.red{color:var(--red)}.pv.orange{color:var(--orange)}
.dpill{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--g3);background:var(--wh);overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-1px;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--blue)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tbadge{background:var(--blue-bg);color:var(--blue);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.tp{display:none}.tp.active{display:block}
/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f4f6fb}
th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--g3);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--g3);color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7f9ff}
.btag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px}
.bt-llc{background:var(--blue-bg);color:var(--blue)}
.bt-cash{background:var(--green-bg);color:var(--green)}
.bt-retail{background:var(--g2);color:var(--g5)}
.cg{color:var(--green);font-weight:600}.cf{color:var(--orange);font-weight:600}.cp{color:var(--red);font-weight:600}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
/* PHOTO */
.prop-photo{width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--g3)}
/* LINKS */
.src-links{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.sl{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;text-decoration:none;display:inline-block}
.sl:hover{opacity:.8}
.sl-z{background:var(--blue-bg);color:var(--blue)}
.sl-r{background:var(--red-bg);color:var(--red)}
.sl-g{background:var(--g2);color:var(--g5)}
.sl-pa{background:var(--green-bg);color:var(--green)}
.sl-sb{background:var(--orange-bg);color:var(--orange)}
/* ARV */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--g3)}
.ac{background:var(--wh);padding:13px 15px}
.al{font-size:10px;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.av{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;color:var(--tx)}
.av.blue{color:var(--blue)}.av.orange{color:var(--orange)}
/* MAO */
.maogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;padding:14px}
.mc{border-radius:8px;padding:14px;border:1.5px solid}
.mc60{background:var(--red-bg);border-color:var(--red-bd)}
.mc65{background:var(--orange-bg);border-color:var(--orange-bd)}
.mc70{background:var(--amber-bg);border-color:var(--amber-bd)}
.mc75{background:var(--green-bg);border-color:var(--green-bd)}
.ml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.mc60 .ml{color:var(--red)}.mc65 .ml{color:var(--orange)}.mc70 .ml{color:var(--amber)}.mc75 .ml{color:var(--green)}
.ma{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--tx);margin-bottom:3px}
.md{font-size:11px;color:var(--tx2);line-height:1.5}
/* RENOV */
.rtable{width:100%;border-collapse:collapse;font-size:12.5px}
.rtable th{background:#f4f6fb;padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--g3)}
.rtable td{padding:9px 13px;border-bottom:1px solid var(--g3)}
.rtable .sub td{background:var(--blue-bg);font-weight:600;color:var(--blue)}
.rtable .tot td{background:var(--navy);color:#fff;font-weight:700;font-size:13px}
/* BARS */
.ibar{padding:11px 15px;border-top:1px solid var(--g3);background:var(--blue-bg)}
.ibar p{font-size:12px;color:#1e40af;line-height:1.6}
.nbar{padding:11px 15px;border-top:1px solid var(--g3)}
.nbar p{font-size:12px;color:var(--tx2);line-height:1.6}
.gbar{padding:11px 15px;background:var(--green-bg);border-top:1px solid var(--green-bd);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.gbar p{font-size:12px;color:#14532d;flex:1;line-height:1.5}
/* LOADING */
.loading{text-align:center;padding:52px 20px;background:var(--wh);border:1px solid var(--g3);border-radius:10px;box-shadow:var(--sh)}
.spin{width:36px;height:36px;border:3px solid var(--g3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading h3{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:5px}
.loading p{font-size:12px;color:var(--g4);margin-bottom:18px}
/* REPORT HEADER */
.rh{background:var(--navy);border-radius:10px;padding:18px 22px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.raddr{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.rmeta{font-size:11px;color:#7fa8d8}
.ract{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ba{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;border:none}
.ba-ghost{background:rgba(255,255,255,.1);color:#c8d8f0;border:1px solid rgba(255,255,255,.2)!important}
.ba-ghost:hover{background:rgba(255,255,255,.18);color:#fff}
.ba-save{background:var(--orange);color:#fff}
.ba-save:hover{background:#f5a443}
.empty{padding:24px;text-align:center;color:var(--g4);font-size:13px}
/* INPUT SECTION */
.input-section{padding:16px;border-bottom:1px solid var(--g3);background:var(--g1)}
.input-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.input-label{font-size:11px;font-weight:600;color:var(--tx2);white-space:nowrap}
.input-field{flex:1;min-width:150px;padding:8px 12px;border:1.5px solid var(--g3);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border-color .2s;background:var(--wh)}
.input-field:focus{border-color:var(--blue)}
@media print{.topbar,.sbar,.ract,.gbar{display:none!important}body{background:#fff}.card{box-shadow:none}}
@media(max-width:640px){.main{padding:12px 12px 48px}.pgrid{grid-template-columns:1fr 1fr}.flow-steps{flex-direction:column;align-items:center}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">123<span>SoldCash</span>.com</div>
  <div class="topbar-r" id="topbar-r">
    <a href="https://crmv3.manus.space" target="_blank" class="btn-xs">← CRM</a>
  </div>
</div>

<div id="app"></div>

<script>
'use strict';

// ── CONFIG ────────────────────────────────────────────────────────
const GH_USER    = '123Soldcash';
const GH_REPO    = 'Wholesale_Comparables';
const ACTIONS_URL = `https://github.com/${GH_USER}/${GH_REPO}/actions`;
const RAW_JSON    = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/comps_result.json`;

let DM_KEY   = localStorage.getItem('dm_key') || '';
let MAPS_KEY = localStorage.getItem('maps_key') || '';
let activeLead = null;

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const addr = new URLSearchParams(location.search).get('address') || '';
  if (DM_KEY) showMain(addr);
  else showSetup();
});

// ── HELPERS ───────────────────────────────────────────────────────
const f  = v => v || '—';
const fm = v => v ? (typeof v === 'number' ? '$' + v.toLocaleString() : v) : '—';
const enc = v => encodeURIComponent(v || '');

function setMain(h) { document.getElementById('main').innerHTML = h; }

function switchTab(id, el) {
  document.querySelectorAll('.tp').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tp-' + id)?.classList.add('active');
  el.classList.add('active');
}

function streetView(addr, w=100, h=75) {
  if (!addr) return `<div style="width:${w}px;height:${h}px;background:var(--g2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--g3)">🏠</div>`;
  const base = `https://maps.googleapis.com/maps/api/streetview?size=${w}x${h}&location=${enc(addr)}`;
  const url  = MAPS_KEY ? `${base}&key=${MAPS_KEY}` : base;
  return `<img src="${url}" style="width:${w}px;height:${h}px;object-fit:cover;border-radius:6px;border:1px solid var(--g3)" alt="" onerror="this.outerHTML='<div style=\\'width:${w}px;height:${h}px;background:var(--g2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--g3)\\'>🏠</div>'">`;
}

function srcLinks(c) {
  const a = c.address || '';
  const links = [];
  if (c.sourceUrl) links.push(`<a href="${c.sourceUrl}" target="_blank" class="sl ${c.source==='Redfin'?'sl-r':'sl-z'}">${c.source||'Source'} ↗</a>`);
  else {
    links.push(`<a href="https://www.zillow.com/homes/${enc(a)}_rb/" target="_blank" class="sl sl-z">Zillow ↗</a>`);
    links.push(`<a href="https://www.redfin.com/FL/${enc(a)}" target="_blank" class="sl sl-r">Redfin ↗</a>`);
  }
  if (MAPS_KEY) links.push(`<a href="https://www.google.com/maps/search/${enc(a)}" target="_blank" class="sl sl-g">Maps ↗</a>`);
  if (c.sunbizUrl) links.push(`<a href="${c.sunbizUrl}" target="_blank" class="sl sl-sb">Sunbiz ↗</a>`);
  if (c.paUrl)     links.push(`<a href="${c.paUrl}" target="_blank" class="sl sl-pa">County PA ↗</a>`);
  return `<div class="src-links">${links.join('')}</div>`;
}

function btTag(t) {
  if (!t) return '<span class="btag bt-retail">Retail</span>';
  const u = t.toUpperCase();
  if (u.includes('LLC')||u.includes('INVESTOR')) return '<span class="btag bt-llc">🏢 LLC/Investor</span>';
  if (u.includes('CASH')) return '<span class="btag bt-cash">💵 Cash</span>';
  return '<span class="btag bt-retail">🏠 Retail</span>';
}

function condTag(c) {
  if (!c) return '—';
  const l = c.toLowerCase();
  if (l.includes('good')||l.includes('excel')) return `<span class="cg">${c}</span>`;
  if (l.includes('poor')||l.includes('bad'))   return `<span class="cp">${c}</span>`;
  return `<span class="cf">${c}</span>`;
}

// ── SETUP ─────────────────────────────────────────────────────────
function showSetup() {
  document.getElementById('app').innerHTML = `
  <div class="setup">
    <div class="scard">
      <div class="sh">
        <h1>123SoldCash — Wholesale Analyzer</h1>
        <p>Connect your DealMachine account to get started. Google Maps API key is optional (enables Street View photos).</p>
      </div>
      <div class="sb">
        <div class="ibox">
          <strong>🏠 How it works:</strong><br>
          1. Connect DealMachine → property data (owner, equity, liens)<br>
          2. Run Python on GitHub Actions → real comps from Redfin/Zillow<br>
          3. Click "Load Last Result" → full wholesale report with photos
        </div>
        <div class="wbox"><strong>Security:</strong> Keys stored only in this browser. Never shared.</div>
        <div class="field">
          <label>DealMachine API Key <span style="color:var(--red)">*</span></label>
          <input type="password" id="f-dm" placeholder="Paste your DealMachine Bearer token..." autocomplete="off">
          <div class="hint">DealMachine → Automation → API Docs → API Keys</div>
        </div>
        <div class="field">
          <label>Google Maps API Key <span style="color:var(--g4);font-weight:400;text-transform:none;letter-spacing:0">(optional — for Street View photos)</span></label>
          <input type="password" id="f-maps" placeholder="AIza... (optional)" autocomplete="off">
          <div class="hint">

async function doAnalyzeDM() {
  const addr = document.getElementById('ain')?.value?.trim();

  if (!DM_KEY) { alert('Please connect your DealMachine API key first.'); return; }
  document.getElementById('btn-go').disabled = true;
  setMain(`<div class="loading"><div class="spin"></div><h3>Looking up ${addr}</h3><p>Fetching from DealMachine...</p></div>`);
  try {
    // Search existing leads
    const ex = await dmFetch('GET', 'leads/?limit=100&after=0');
    const leads = Array.isArray(ex.data) ? ex.data : [];
    const needle = addr.toLowerCase().replace(/[,.]/g, '');
    let lead = leads.find(l => {
      const p = l.property || {};
      const hay = [p.address,p.city,p.state,p.zip].join(' ').toLowerCase().replace(/[,.]/g,'');
      return needle.split(' ').slice(0,3).filter(Boolean).every(w => hay.includes(w));
    });
    if (!lead) {
      const parts = addr.split(',').map(s => s.trim());
      const fd = new FormData();
      if (parts.length >= 3) {
        fd.append('address', parts[0]);

        const sp = (parts[2]||'').trim().split(' ');
        fd.append('state', sp[0]||'');
        fd.append('zip', sp[1]||'');
      } else { fd.append('full_address', addr); }
      const added = await dmFetch('POST', 'leads/', fd);
      lead = added.data || added;
    }
    activeLead = lead;
    // DEBUG: log full response to console so we can see field names
    console.log('=== DealMachine Full Response ===');

    const p = lead.property || lead;

// ── RENOVATION CALCULATOR ─────────────────────────────────────────
function calcRenov(sf, baths, arv) {
  sf = sf || 0; baths = baths || 2; arv = arv || 0;
  const kitchen    = Math.round(180 * sf * 0.1);
  const bathrooms  = Math.round(110 * sf * 0.03 * baths);
  const painting   = Math.round(6 * sf);
  const flooring   = Math.round(11 * sf * 0.8);
  const roof       = Math.round(15 * sf);
  const ac         = Math.round(6.5 * sf);
  const cleaning   = Math.round(1.5 * sf);
  const gardens    = Math.round(1.8 * sf);
  const renovSub   = kitchen+bathrooms+painting+flooring+roof+ac+cleaning+gardens;
  const misc       = Math.round(renovSub * 0.05);
  const permits    = Math.round(renovSub * 0.03);
  const holdCost   = Math.round(2 * sf * 6);
  const commission = Math.round(0.06 * (arv + renovSub));
  const totalGeral = renovSub+misc+permits+holdCost+commission;
  return {sf,baths,kitchen,bathrooms,painting,flooring,roof,ac,cleaning,gardens,renovSub,misc,permits,holdCost,commission,totalGeral};
}

    <div class="input-section">
      <div class="input-row">
        <span class="input-label">Square feet:</span>
        <input class="input-field" type="number" id="r-sf" value="${r.sf||0}" style="max-width:120px" oninput="recalcRenov()">
        <span class="input-label">Bathrooms:</span>
        <input class="input-field" type="number" id="r-baths" value="${r.baths||2}" style="max-width:80px" oninput="recalcRenov()">
        <span class="input-label">ARV ($):</span>
        <input class="input-field" type="number" id="r-arv" value="${arv||0}" style="max-width:140px" oninput="recalcRenov()">
      </div>
    </div>
    <div id="renov-table-wrap">${renovTable(r, arv)}</div>
  </div>`;
}

function renovTable(r, arv) {
  const arvN = arv || 0;
  return `<table class="rtable">
    <thead><tr><th>Item</th><th>Formula</th><th>Calculation</th><th style="text-align:right">Cost</th></tr></thead>
    <tbody>
      <tr><td>New kitchen + appliances</td><td>$180 × 10% SF</td><td>$180 × ${Math.round((r.sf||0)*.1)}</td><td class="mono" style="text-align:right">$${(r.kitchen||0).toLocaleString()}</td></tr>
      <tr><td>New bathrooms ×${r.baths||2}</td><td>$110 × 3% SF × baths</td><td>$110 × ${Math.round((r.sf||0)*.03)} × ${r.baths||2}</td><td class="mono" style="text-align:right">$${(r.bathrooms||0).toLocaleString()}</td></tr>
      <tr><td>Painting (int/ext)</td><td>$6 × SF</td><td>$6 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.painting||0).toLocaleString()}</td></tr>
      <tr><td>New flooring</td><td>$11 × 80% SF</td><td>$11 × ${Math.round((r.sf||0)*.8)}</td><td class="mono" style="text-align:right">$${(r.flooring||0).toLocaleString()}</td></tr>
      <tr><td>New roof</td><td>$15 × SF</td><td>$15 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.roof||0).toLocaleString()}</td></tr>
      <tr><td>New A/C</td><td>$6.50 × SF</td><td>$6.50 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.ac||0).toLocaleString()}</td></tr>
      <tr><td>Cleaning</td><td>$1.50 × SF</td><td>$1.50 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.cleaning||0).toLocaleString()}</td></tr>
      <tr><td>Gardens / landscaping</td><td>$1.80 × SF</td><td>$1.80 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.gardens||0).toLocaleString()}</td></tr>
      <tr class="sub"><td colspan="3"><strong>Renovation subtotal</strong></td><td class="mono" style="text-align:right"><strong>$${(r.renovSub||0).toLocaleString()}</strong></td></tr>
      <tr><td>Miscellaneous (5%)</td><td></td><td>5% × $${(r.renovSub||0).toLocaleString()}</td><td class="mono" style="text-align:right">$${(r.misc||0).toLocaleString()}</td></tr>
      <tr><td>Permits &amp; related (3%)</td><td></td><td>3% × $${(r.renovSub||0).toLocaleString()}</td><td class="mono" style="text-align:right">$${(r.permits||0).toLocaleString()}</td></tr>
      <tr><td>Hold cost (6 months)</td><td>$2 × SF × 6</td><td>$2 × ${r.sf||0} × 6</td><td class="mono" style="text-align:right">$${(r.holdCost||0).toLocaleString()}</td></tr>
      <tr><td>Real estate commission</td><td>6% × (ARV + renov)</td><td>6% × ($${arvN.toLocaleString()} + $${(r.renovSub||0).toLocaleString()})</td><td class="mono" style="text-align:right">$${(r.commission||0).toLocaleString()}</td></tr>
      <tr class="tot"><td colspan="3"><strong>Total geral</strong></td><td class="mono" style="text-align:right;color:#7fb3ff"><strong>$${(r.totalGeral||0).toLocaleString()}</strong></td></tr>
    </tbody>
  </table>`;
}

function recalcRenov() {
  const sf    = parseInt(document.getElementById('r-sf')?.value||0);
  const baths = parseInt(document.getElementById('r-baths')?.value||2);
  const arv   = parseFloat(document.getElementById('r-arv')?.value||0);
  const renov = calcRenov(sf, baths, arv);
  const wrap  = document.getElementById('renov-table-wrap');
  if (wrap) wrap.innerHTML = renovTable(renov, arv);
  // Update MAO
  const maoWrap = document.getElementById('mao-wrap');
  if (maoWrap) maoWrap.innerHTML = maoCards(arv, renov.totalGeral);
}

// ── MAO ───────────────────────────────────────────────────────────
function renderMAO(arv, totalGeral) {
  return `<div class="card">
    <div class="card-head"><div class="cicon ci-r">💰</div><div class="card-title">MAO — maximum allowable offer</div><div class="card-sub">Updates automatically when you edit renovation above</div></div>
    <div id="mao-wrap">${maoCards(arv, totalGeral)}</div>
  </div>`;
}

function maoCards(arv, totalGeral) {
  const a = arv || 0;
  const t = totalGeral || 0;
  const mao = pct => a ? '$' + Math.round(a * pct - t).toLocaleString() : '—';
  return `<div class="maogrid">
    <div class="mc mc60"><div class="ml">60% — distressed/probate</div><div class="ma">${mao(.60)}</div><div class="md">ARV × 60% − all-in<br>Aggressive / deep wholesale</div></div>
    <div class="mc mc65"><div class="ml">65% — deep wholesale</div><div class="ma">${mao(.65)}</div><div class="md">ARV × 65% − all-in<br>Strong investor margin</div></div>
    <div class="mc mc70"><div class="ml">70% — standard wholesale</div><div class="ma">${mao(.70)}</div><div class="md">ARV × 70% − all-in<br>Flipper standard</div></div>
    <div class="mc mc75"><div class="ml">75% — light rehab</div><div class="ma">${mao(.75)}</div><div class="md">ARV × 75% − all-in<br>Best-case / tight margin</div></div>
  </div>
  <div class="nbar"><p><strong>Recommended range: ${mao(.65)} – ${mao(.70)}.</strong> ARV: $${a.toLocaleString()} · All-in cost: $${t.toLocaleString()}</p></div>`;
}

// ── MY DM LEADS ───────────────────────────────────────────────────
async function loadLeads() {
  setMain(`<div class="loading"><div class="spin"></div><h3>Loading your DealMachine leads...</h3></div>`);
  try {
    const r = await dmFetch('GET', 'leads/?limit=50&after=0');
    const leads = Array.isArray(r.data) ? r.data : [];
    if (!leads.length) { setMain(`<div class="loading"><p>No leads found. Enter an address above.</p></div>`); return; }
    setMain(`<div class="card">
      <div class="card-head"><div class="cicon ci-b">📋</div><div class="card-title">Your DealMachine Leads</div><span class="dm-badge">✓ Live Data</span></div>
      ${leads.map(l => {
        const p = l.property||{};
        const addr = [p.address,p.city,p.state,p.zip].filter(Boolean).join(', ')||'Unknown';
        const meta = [p.beds&&p.beds+'bd',p.baths&&p.baths+'ba',p.square_feet&&p.square_feet+'sf',
          p.estimated_value&&'$'+Number(p.estimated_value).toLocaleString()].filter(Boolean).join(' · ');
        return `<div style="padding:10px 15px;border-bottom:1px solid var(--g3);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s" onclick="selectLead('${l.id}','${addr.replace(/'/g,"\\'")}')">
          ${streetView(addr, 60, 45)}
          <div style="flex:1"><div style="font-size:13px;font-weight:500">${addr}</div><div style="font-size:11px;color:var(--tx2);margin-top:1px">${meta}</div></div>
          <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--g2);color:var(--g5)">${l.lead_status?.label||'—'}</span>
          <span style="color:var(--g4);font-size:16px">›</span>
        </div>`;
      }).join('')}
    </div>`);
  } catch(e) { setMain(`<div class="loading"><p style="color:var(--red)">${e.message}</p></div>`); }
}

async function selectLead(id, addr) {
  document.getElementById('ain').value = addr;
  setMain(`<div class="loading"><div class="spin"></div><h3>Loading ${addr}...</h3></div>`);
  try {
    const j = await dmFetch('GET', `leads/${id}`);
    activeLead = j.data||j;
    renderDMReport(activeLead, addr);
  } catch(e) { setMain(`<div class="loading"><p style="color:var(--red)">${e.message}</p></div>`); }
}

// ── DM FETCH ─────────────────────────────────────────────────────
async function dmFetch(method, path, body) {
  const opts = { method, headers: { 'Authorization': `Bearer ${DM_KEY}` } };
  if (body) opts.body = body;
  const r = await fetch(`https://api.dealmachine.com/public/v1/${path}`, opts);
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.message || `DealMachine error ${r.status}`);
  return j;
}

// ── SAVE NOTE ─────────────────────────────────────────────────────
async function saveNote() {
  if (!activeLead || !window._report) { alert('No report to save.'); return; }
  const r = window._report.renov || {};
  const arvN = window._report.data?.avgSalePrice || 0;
  const note = `=== 123SoldCash Wholesale Analysis ===\nDate: ${new Date().toLocaleDateString()}\nAll-in Cost: $${(r.totalGeral||0).toLocaleString()}\nMAO 60%: $${Math.round(arvN*.6-(r.totalGeral||0)).toLocaleString()}\nMAO 65%: $${Math.round(arvN*.65-(r.totalGeral||0)).toLocaleString()}\nMAO 70%: $${Math.round(arvN*.7-(r.totalGeral||0)).toLocaleString()}`;
  try {
    const fd = new FormData(); fd.append('note', note);
    await dmFetch('POST', `leads/${activeLead.id}/create-note`, fd);
    alert('✅ Saved to DealMachine!');
  } catch(e) { alert('Error: ' + e.message); }
}

function copyLink() {
  const a = document.getElementById('ain')?.value?.trim() || '';
  const url = location.origin + location.pathname + '?address=' + encodeURIComponent(a);
  navigator.clipboard.writeText(url).then(() => alert('Link copied!\n\n' + url)).catch(() => prompt('Copy:', url));
}
</script>
