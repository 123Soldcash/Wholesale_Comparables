<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>123SoldCash — Wholesale Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2244;--blue:#1a5cdb;--blue-bg:#eef4ff;--blue-bd:#c0d4ff;--orange:#e07b1a;--orange-bg:#fff4e6;--orange-bd:#fcd4a0;--green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;--red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;--amber-bg:#fffbeb;--amber:#92400e;--amber-bd:#fde68a;--g1:#f8f9fb;--g2:#f0f2f6;--g3:#e2e6ed;--g4:#9aa3b2;--g5:#6b7280;--tx:#1a1f2e;--tx2:#4b5568;--wh:#fff;--sh:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--r:10px;--r2:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--g1);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.topbar{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-weight:700;font-size:15px;color:#fff}.logo span{color:#f5a443}
.topbar-r{display:flex;align-items:center;gap:10px}
.badge-green{font-size:11px;color:#4ade80;display:flex;align-items:center;gap:4px;background:rgba(74,222,128,.1);padding:3px 10px;border-radius:20px;border:1px solid rgba(74,222,128,.2)}
.btn-xs{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#a8c4e8;padding:4px 11px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-decoration:none;display:inline-block}
.btn-xs:hover{background:rgba(255,255,255,.16);color:#fff}
/* SETUP */
.setup{max-width:520px;margin:48px auto;padding:0 16px}
.setup-card{background:var(--wh);border:1px solid var(--g3);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.setup-head{background:var(--navy);padding:24px 28px}
.setup-head h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.setup-head p{font-size:12px;color:#7fa8d8;line-height:1.6}
.setup-body{padding:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.field input{width:100%;padding:9px 13px;border:1.5px solid var(--g3);border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border-color .2s;background:var(--g1)}
.field input:focus{border-color:var(--blue);background:#fff}
.field input::placeholder{color:#b0b8c8}
.field .hint{font-size:11px;color:var(--g4);margin-top:4px;line-height:1.5}
.field .hint a{color:var(--blue)}
.btn-main{width:100%;background:var(--blue);color:#fff;border:none;padding:11px;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-main:hover{background:#1448b8}
.btn-main:disabled{background:var(--g4);cursor:not-allowed}
.warn{background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:var(--r2);padding:11px 13px;margin-bottom:18px;font-size:11px;color:#7a4500;line-height:1.6}
.warn strong{color:var(--orange)}
.info-setup{background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--r2);padding:11px 13px;margin-bottom:18px;font-size:11px;color:#1e40af;line-height:1.7}
.err-inline{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}
/* SEARCH */
.sbar{background:var(--wh);border-bottom:1px solid var(--g3);padding:10px 20px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.sbar-label{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.sbar-iw{flex:1;min-width:220px;position:relative}
.sbar-iw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--g4)}
.sbar-in{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--g3);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;background:var(--g1)}
.sbar-in:focus{border-color:var(--blue);background:#fff}
.sbar-in::placeholder{color:#b0b8c8}
.btn-go{background:var(--blue);color:#fff;border:none;padding:8px 18px;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-go:hover{background:#1448b8}
.btn-go:disabled{background:var(--g4);cursor:not-allowed}
.btn-sec{background:var(--g2);color:var(--tx2);border:1px solid var(--g3);padding:7px 13px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-sec:hover{background:var(--g3)}
/* CONTENT */
.main{max-width:1180px;margin:0 auto;padding:18px 18px 60px}
/* LEADS */
.leads-panel{background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:14px}
.panel-head{padding:11px 15px;border-bottom:1px solid var(--g3);background:var(--g1);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:12px;font-weight:600;color:var(--tx2)}
.lead-row{padding:10px 15px;border-bottom:1px solid var(--g3);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.lead-row:last-child{border-bottom:none}
.lead-row:hover{background:var(--blue-bg)}
.lead-addr{font-size:13px;font-weight:500;color:var(--tx);flex:1}
.lead-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.lead-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;background:var(--g2);color:var(--g5)}
.empty-state{padding:32px;text-align:center;color:var(--g4);font-size:13px}
/* LOADING */
.loading{text-align:center;padding:56px 20px;background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);box-shadow:var(--sh)}
.spin{width:36px;height:36px;border:3px solid var(--g3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading h3{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:5px}
.loading p{font-size:12px;color:var(--g4);margin-bottom:18px}
.steps{display:inline-flex;flex-direction:column;gap:7px;text-align:left}
.step{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--g4)}
.step.active{color:var(--blue);font-weight:600}
.step.done{color:var(--green)}
.step-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
/* REPORT */
.rpt-head{background:var(--navy);border-radius:var(--r);padding:18px 22px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.rpt-addr{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.rpt-meta{font-size:11px;color:#7fa8d8}
.rpt-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-action{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;border:none}
.ba-outline{background:rgba(255,255,255,.1);color:#c8d8f0;border:1px solid rgba(255,255,255,.2)!important}
.ba-outline:hover{background:rgba(255,255,255,.18);color:#fff}
.ba-orange{background:var(--orange);color:#fff}
.ba-orange:hover{background:#f5a443}
/* CARDS */
.card{background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)}
.card-head{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--g3);background:var(--g1)}
.card-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ci-b{background:var(--blue-bg)}.ci-g{background:var(--green-bg)}.ci-o{background:var(--orange-bg)}.ci-r{background:var(--red-bg)}
.card-title{font-size:13px;font-weight:600;color:var(--tx);flex:1}
.card-note{font-size:11px;color:var(--g4)}
/* PROP GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}
.pcell{padding:12px 15px;border-right:1px solid var(--g3);border-bottom:1px solid var(--g3)}
.plabel{font-size:10px;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.pval{font-size:13px;font-weight:500;color:var(--tx)}
.pval.blue{color:var(--blue)}.pval.green{color:var(--green)}.pval.red{color:var(--red)}.pval.orange{color:var(--orange)}
.dpill{display:inline-block;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em}
.dm-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;padding:2px 8px;border-radius:10px}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--g3);background:var(--wh);overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-1px;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--blue)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tbadge{background:var(--blue-bg);color:var(--blue);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.tab-content{display:none}.tab-content.active{display:block}
/* TABLES */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f4f6fb}
th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--g3);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--g3);color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7f9ff}
.btag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.bt-llc{background:var(--blue-bg);color:var(--blue)}
.bt-cash{background:var(--green-bg);color:var(--green)}
.bt-retail{background:var(--g2);color:var(--g5)}
.cg{color:var(--green);font-weight:600}.cf{color:var(--orange);font-weight:600}.cp{color:var(--red);font-weight:600}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
/* ARV */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--g3)}
.acell{background:var(--wh);padding:13px 15px}
.alabel{font-size:10px;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.aval{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;color:var(--tx)}
.aval.blue{color:var(--blue)}.aval.orange{color:var(--orange)}
/* MAO */
.maogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;padding:14px}
.mc{border-radius:8px;padding:14px;border:1.5px solid}
.mc60{background:var(--red-bg);border-color:var(--red-bd)}
.mc65{background:var(--orange-bg);border-color:var(--orange-bd)}
.mc70{background:var(--amber-bg);border-color:var(--amber-bd)}
.mc75{background:var(--green-bg);border-color:var(--green-bd)}
.mlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.mc60 .mlabel{color:var(--red)}.mc65 .mlabel{color:var(--orange)}.mc70 .mlabel{color:var(--amber)}.mc75 .mlabel{color:var(--green)}
.mamount{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--tx);margin-bottom:3px}
.mdesc{font-size:11px;color:var(--tx2);line-height:1.5}
/* RENOV */
.renov-table{width:100%;border-collapse:collapse;font-size:12.5px}
.renov-table th{background:#f4f6fb;padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--g3)}
.renov-table td{padding:9px 13px;border-bottom:1px solid var(--g3)}
.renov-table .subt td{background:var(--blue-bg);font-weight:600;color:var(--blue)}
.renov-table .tot td{background:var(--navy);color:#fff;font-weight:700;font-size:13px}
.info-bar{padding:11px 15px;border-top:1px solid var(--g3);background:var(--blue-bg)}
.info-bar p{font-size:12px;color:#1e40af;line-height:1.6}
.notes-bar{padding:11px 15px;border-top:1px solid var(--g3)}
.notes-bar p{font-size:12px;color:var(--tx2);line-height:1.6}
@media print{.topbar,.sbar,.rpt-acts{display:none!important}body{background:#fff}.card{box-shadow:none}}
@media(max-width:600px){.main{padding:12px 12px 48px}.pgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">123<span>SoldCash</span>.com</div>
  <div class="topbar-r" id="topbar-r">
    <a href="https://crmv3.manus.space" target="_blank" class="btn-xs">← CRM</a>
  </div>
</div>
<div id="app"></div>

<script>
// ── State ─────────────────────────────────────────────────────────
let DM_KEY  = localStorage.getItem('dm_key')     || '';
let GM_KEY  = localStorage.getItem('gemini_key') || '';
let currentLead = null;
let currentStep = -1;
const STEPS = [
  'Searching your DealMachine leads...',
  'Adding property & pulling real data from DealMachine...',
  '✓ Real property data retrieved',
  'Gemini AI searching comps & market data...',
  'Calculating ARV, MAO, renovation costs...'
];

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(window.location.search);
  const a = p.get('address') || p.get('property');
  if (DM_KEY && GM_KEY) showSearch(a);
  else showSetup();
});

// ── SETUP SCREEN ──────────────────────────────────────────────────
function showSetup() {
  document.getElementById('app').innerHTML = `
  <div class="setup">
    <div class="setup-card">
      <div class="setup-head">
        <h1>123SoldCash — Wholesale Analyzer</h1>
        <p>Enter your API keys once. Everything is stored locally in your browser — never sent to any server.</p>
      </div>
      <div class="setup-body">
        <div class="info-setup">
          <strong>🆓 Both integrations are free to start:</strong><br>
          • DealMachine — you already have an account<br>
          • Google Gemini — free tier: 1,500 analyses/day, no credit card needed
        </div>
        <div class="warn"><strong>Security:</strong> Keys saved only in this browser's localStorage. Never shared externally.</div>

        <div class="field">
          <label>DealMachine API Key</label>
          <input type="password" id="dkin" placeholder="Paste your DealMachine Bearer token..." autocomplete="off">
          <div class="hint">DealMachine → Automation → API Docs → API Keys</div>
        </div>

        <div class="field">
          <label>Google Gemini API Key (Free)</label>
          <input type="password" id="gkin" placeholder="AIza..." autocomplete="off">
          <div class="hint">
            Get your free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> — click <strong>Create API Key</strong>, no credit card required.
          </div>
          <div class="err-inline" id="kerr"></div>
        </div>

        <button class="btn-main" id="cbtn" onclick="connectAll()">
          ⚡ Connect & Start Analyzing
        </button>
      </div>
    </div>
  </div>`;
  document.getElementById('dkin').focus();
  ['dkin','gkin'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') connectAll(); })
  );
}

async function connectAll() {
  const dk = document.getElementById('dkin').value.trim();
  const gk = document.getElementById('gkin').value.trim();
  const err = document.getElementById('kerr');
  err.textContent = '';
  if (!dk) { err.textContent = 'Enter your DealMachine API key.'; return; }
  if (!gk) { err.textContent = 'Enter your Gemini API key.'; return; }
  if (dk.length < 10) { err.textContent = 'DealMachine key looks too short — paste the full key.'; return; }
  if (!gk.startsWith('AIza')) { err.textContent = 'Gemini key should start with AIza...'; return; }

  const btn = document.getElementById('cbtn');
  btn.disabled = true; btn.textContent = 'Connecting...';

  try {
    // Validate Gemini key only (no CORS issues)
    const gr = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${gk}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:'Reply with just the word OK'}]}] }) }
    );
    if (!gr.ok) {
      const ge = await gr.json().catch(()=>({}));
      throw new Error('Invalid Gemini API key: ' + (ge.error?.message || 'Check your key at aistudio.google.com'));
    }

    DM_KEY = dk; GM_KEY = gk;
    localStorage.setItem('dm_key', dk);
    localStorage.setItem('gemini_key', gk);
    showSearch();
  } catch(e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = '⚡ Connect & Start Analyzing';
  }
}

// ── SEARCH SCREEN ─────────────────────────────────────────────────
function showSearch(autoAddr = null) {
  document.getElementById('topbar-r').innerHTML = `
    <div class="badge-green">
      <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#4ade80"/></svg>
      Connected
    </div>
    <a href="https://crmv3.manus.space" target="_blank" class="btn-xs">← CRM</a>
    <button class="btn-xs" onclick="disconnect()">Disconnect</button>`;

  document.getElementById('app').innerHTML = `
    <div class="sbar">
      <span class="sbar-label">Address</span>
      <div class="sbar-iw">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <input class="sbar-in" id="ain" type="text"
          placeholder="e.g. 438 NE 2nd St, Pompano Beach, FL 33060" autocomplete="off">
      </div>
      <button class="btn-go" id="gobtn" onclick="run()">Analyze →</button>
      <button class="btn-sec" onclick="loadLeads()">My DM Leads</button>
    </div>
    <div class="main" id="mc">
      <div style="text-align:center;padding:56px 20px;background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);box-shadow:var(--sh)">
        <div style="font-size:40px;margin-bottom:12px">🏠</div>
        <div style="font-size:16px;font-weight:600;color:var(--tx);margin-bottom:8px">DealMachine + Gemini Wholesale Analyzer</div>
        <div style="font-size:12px;color:var(--g4);max-width:400px;margin:0 auto 20px;line-height:1.7">
          Real property data from DealMachine (owner, equity, liens) + Gemini AI finds comps,<br>
          identifies <strong>LLC/Investor vs. Retail buyers</strong>, calculates ARV & MAO.
        </div>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
          <span onclick="ex('438 NE 2nd St, Pompano Beach, FL 33060')"
            style="background:var(--g2);border:1px solid var(--g3);color:var(--tx2);font-size:11px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:background .15s"
            onmouseover="this.style.background='var(--blue-bg)'" onmouseout="this.style.background='var(--g2)'">
            438 NE 2nd St, Pompano Beach FL
          </span>
          <span onclick="ex('19905 SW 147th Ave, Miami, FL 33187')"
            style="background:var(--g2);border:1px solid var(--g3);color:var(--tx2);font-size:11px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:background .15s"
            onmouseover="this.style.background='var(--blue-bg)'" onmouseout="this.style.background='var(--g2)'">
            19905 SW 147th Ave, Miami FL
          </span>
        </div>
      </div>
    </div>`;

  document.getElementById('ain').addEventListener('keydown', e => { if(e.key==='Enter') run(); });
  if (autoAddr) { document.getElementById('ain').value = autoAddr; run(); }
}

function ex(a) { document.getElementById('ain').value = a; run(); }
function disconnect() {
  ['dm_key','gemini_key'].forEach(k => localStorage.removeItem(k));
  DM_KEY = ''; GM_KEY = '';
  showSetup();
}

// ── LOAD MY DM LEADS ──────────────────────────────────────────────
async function loadLeads() {
  const mc = document.getElementById('mc');
  mc.innerHTML = `<div class="loading"><div class="spin"></div><h3>Loading your DealMachine leads...</h3><p>Fetching from your account</p></div>`;
  try {
    const r = await fetch('https://api.dealmachine.com/public/v1/leads/?limit=50&after=0', {
      headers: { 'Authorization': `Bearer ${DM_KEY}` }
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.message || 'Failed to load leads');
    const leads = Array.isArray(j.data) ? j.data : (j.data ? [j.data] : []);
    if (!leads.length) {
      mc.innerHTML = `<div class="leads-panel"><div class="empty-state">No leads found. Enter an address above to analyze a property.</div></div>`;
      return;
    }
    mc.innerHTML = `<div class="leads-panel">
      <div class="panel-head">
        <span class="panel-title">Your DealMachine Leads — click to analyze</span>
        <span class="dm-badge">✓ Live Data</span>
      </div>
      ${leads.map(l => {
        const p = l.property || {};
        const addr = [p.address,p.city,p.state,p.zip].filter(Boolean).join(', ') || l.full_address || 'Unknown';
        const meta = [
          p.beds ? p.beds+'bd' : '',
          p.baths ? p.baths+'ba' : '',

          p.estimated_value ? '$'+Number(p.estimated_value).toLocaleString() : ''

  } catch(e) {

}

// ── ANALYZE BY LEAD ID ────────────────────────────────────────────
async function analyzeById(id, addr) {
  document.getElementById('ain').value = addr;
  showLoading(addr);
  try {
    const r = await fetch(`https://api.dealmachine.com/public/v1/leads/${id}`, {
      headers: { 'Authorization': `Bearer ${DM_KEY}` }
    });
    const j = await r.json();
    if (!r.ok) throw new Error('Failed to fetch lead');
    currentLead = j.data || j;
    updateStep(2);
    await genAnalysis(currentLead);
  } catch(e) { showErr(e.message); }
}

// ── ANALYZE BY ADDRESS ────────────────────────────────────────────
async function run() {
  const addr = document.getElementById('ain')?.value?.trim();
  if (!addr) { document.getElementById('ain')?.focus(); return; }
  document.getElementById('gobtn').disabled = true;
  showLoading(addr);
  try {
    updateStep(0);
    // Search existing leads first
    const sr = await fetch('https://api.dealmachine.com/public/v1/leads/?limit=100&after=0', {
      headers: { 'Authorization': `Bearer ${DM_KEY}` }
    });
    const sj = await sr.json();
    const leads = Array.isArray(sj.data) ? sj.data : [];
    const al = addr.toLowerCase().replace(/[,.]/g,'');
    let lead = leads.find(l => {
      const p = l.property || {};
      const full = [p.address,p.city,p.state,p.zip].join(' ').toLowerCase().replace(/[,.]/g,'');
      return al.split(' ').slice(0,3).filter(Boolean).every(pt => full.includes(pt));
    });

    if (!lead) {
      updateStep(1);
      const parts = addr.split(',').map(s => s.trim());
      const fd = new FormData();
      if (parts.length >= 3) {
        fd.append('address', parts[0]);
        fd.append('city', parts[1] || '');
        const sp = (parts[2] || '').trim().split(' ');
        fd.append('state', sp[0] || '');
        fd.append('zip', sp[1] || '');
      } else {
        fd.append('full_address', addr);
      }
      const ar = await fetch('https://api.dealmachine.com/public/v1/leads/', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${DM_KEY}` },
        body: fd
      });
      const aj = await ar.json();
      if (!ar.ok) throw new Error(aj.message || 'Could not look up this address in DealMachine.');
      lead = aj.data || aj;
    }

    currentLead = lead;
    updateStep(2);
    await genAnalysis(lead);
  } catch(e) {
    showErr(e.message);
  } finally {
    const b = document.getElementById('gobtn');
    if (b) b.disabled = false;
  }
}

// ── GEMINI AI ANALYSIS ────────────────────────────────────────────
async function genAnalysis(lead) {
  updateStep(3);
  const p = lead.property || lead;
  const addr = [p.address,p.city,p.state,p.zip].filter(Boolean).join(', ') || lead.full_address || 'Unknown';

  const ctx = JSON.stringify({
    address: addr,
    owner: [p.owner_first_name,p.owner_last_name].filter(Boolean).join(' ') || p.owner_name,
    beds: p.beds||p.bedrooms, baths: p.baths||p.bathrooms,
    square_feet: p.square_feet||p.sqft, lot_size_sqft: p.lot_size_sqft||p.lot_size,
    year_built: p.year_built, property_type: p.property_type||p.use_type,
    estimated_value: p.estimated_value||p.avm_value,
    last_sale_amount: p.last_sale_amount||p.last_sale_price, last_sale_date: p.last_sale_date,
    equity_percent: p.equity_percent, mortgage_balance: p.mortgage_balance||p.open_mortgage_amount,
    tax_delinquent: p.tax_delinquent, tax_delinquent_amount: p.tax_delinquent_amount,
    in_foreclosure: p.foreclosure||p.in_foreclosure, absentee_owner: p.absentee_owner,
    vacant: p.vacant, lien_count: p.lien_count, deed_type: p.deed_type
  }, null, 2);

  const prompt = `You are a Wholesale Real Estate Expert with 15+ years experience in distressed properties (probate, foreclosure, pre-foreclosure, tax liens, needs repairs). Expert in ARV, MAO calculations, and comp analysis.

REAL property data from DealMachine:
${ctx}

TASK: Analyze this property for wholesale real estate. Use the DealMachine data above for the property section. Generate realistic comparable sales data based on your knowledge of real estate market conditions in that specific area and neighborhood.

BUYER TYPE RULE — classify every comp buyer as:
- "LLC/INVESTOR": name contains LLC, Corp, Inc, Holdings, Properties, Investments, Group, Capital, Acquisitions, Trust, Fund
- "CASH BUYER": individual, no mortgage recorded
- "RETAIL BUYER": individual, used mortgage financing

Return ONLY a valid JSON object. No markdown, no explanation, no code fences. Exactly this structure:
{
  "property": {
    "address": "", "owner": "", "sf": "", "yearBuilt": "", "style": "",
    "beds": "", "baths": "", "lotSize": "", "lastSaleAmount": "", "lastSaleDate": "",
    "deed": "", "estimatedValue": "", "taxStatus": "", "distress": "",
    "openLiens": "", "equity": "", "mortgageBalance": ""
  },
  "sold6": [
    {"address":"","beds":"","baths":"","sf":"","lotSf":"","yearBuilt":"","distance":"","saleDate":"","price":"","priceSF":"","buyerName":"","buyerType":"","condition":""}
  ],
  "sold12": [ ],
  "pending": [
    {"address":"","beds":"","baths":"","sf":"","distance":"","listedDate":"","listPrice":"","priceSF":"","dom":"","condition":""}
  ],
  "forSale": [ ],
  "forRent": [
    {"address":"","beds":"","baths":"","sf":"","distance":"","listedDate":"","monthlyRent":"","rentSF":"","dom":"","condition":""}
  ],
  "arv": {
    "avgPriceSF6mo":"","avgPriceSF12mo":"","estimatedARV":"","arvLow":"","arvHigh":"",
    "cashSalePct":"","investorPct":"","dominantBuyer":"","marketTrend":"","avgDOM":"",
    "activeInvestors":"","notes":""
  },
  "renovation": {
    "sf":0,"baths":0,"kitchen":0,"bathrooms":0,"painting":0,"flooring":0,
    "roof":0,"ac":0,"cleaning":0,"gardens":0,"renovSubtotal":0,
    "misc":0,"permits":0,"holdCost":0,"commission":0,"totalGeral":0
  }
}

Rules:
- sold6: 5-6 comps from last 6 months, 1-mile radius, similar bed/bath/sf
- sold12: 5-6 additional comps from months 7-12
- pending: 2-3 properties
- forSale: 3-4 active listings
- forRent: 2-3 rental listings
- renovation: use DealMachine SF and baths, calculate using formulas: kitchen=$180×10%SF, bathrooms=$110×3%SF×baths, painting=$6×SF, flooring=$11×80%SF, roof=$15×SF, ac=$6.5×SF, cleaning=$1.5×SF, gardens=$1.8×SF, misc=5% of subtotal, permits=3% of subtotal, holdCost=$2×SF×6, commission=6%×(estimatedARV+renovSubtotal)`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GM_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            temperature: 0.3,
            maxOutputTokens: 8192,
            responseMimeType: 'application/json'
          }
        })
      }
    );

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `Gemini API error ${res.status}`);
    }

    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g,'').trim();
    const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
    if (s === -1) throw new Error('Could not parse Gemini response. Please try again.');
    const result = JSON.parse(clean.slice(s, e+1));

    // Override AI property data with real DealMachine data
    result.property = mergeReal(result.property, p, addr);
    updateStep(4);
    render(addr, result, lead);

  } catch(e) {
    showErr(e.message);
  }
}

// ── MERGE REAL DM DATA ────────────────────────────────────────────
function mergeReal(ai, dm, addr) {
  return {
    ...ai, address: addr,
    owner: [dm.owner_first_name,dm.owner_last_name].filter(Boolean).join(' ') || dm.owner_name || ai.owner,
    sf: dm.square_feet||dm.sqft||ai.sf,
    yearBuilt: dm.year_built||ai.yearBuilt,
    beds: dm.beds||dm.bedrooms||ai.beds,
    baths: dm.baths||dm.bathrooms||ai.baths,
    lotSize: dm.lot_size_sqft ? Number(dm.lot_size_sqft).toLocaleString()+' sf' : ai.lotSize,
    lastSaleAmount: dm.last_sale_amount ? '$'+Number(dm.last_sale_amount).toLocaleString() : ai.lastSaleAmount,
    lastSaleDate: dm.last_sale_date||ai.lastSaleDate,
    estimatedValue: (dm.estimated_value||dm.avm_value) ? '$'+Number(dm.estimated_value||dm.avm_value).toLocaleString() : ai.estimatedValue,
    equity: dm.equity_percent ? Math.round(dm.equity_percent)+'%' : ai.equity,
    mortgageBalance: dm.mortgage_balance ? '$'+Number(dm.mortgage_balance).toLocaleString() : ai.mortgageBalance,
    taxStatus: dm.tax_delinquent ? `DELINQUENT — $${Number(dm.tax_delinquent_amount||0).toLocaleString()} owed` : (ai.taxStatus||'Current'),
    distress: [
      (dm.foreclosure||dm.in_foreclosure) && 'Foreclosure',
      dm.tax_delinquent && 'Tax Delinquent',
      dm.vacant && 'Vacant',
      dm.absentee_owner && 'Absentee Owner',
      dm.lien_count > 0 && `${dm.lien_count} Lien(s)`
    ].filter(Boolean).join(' / ') || ai.distress || 'None detected',
    openLiens: dm.lien_count > 0 ? `${dm.lien_count} lien(s) recorded` : (ai.openLiens||'None'),
    deed: dm.deed_type||ai.deed,
    _real: true
  };
}

function showLoading(addr) {

function updateStep(i) {
  if (currentStep >= 0) {
    const prev = document.getElementById('st'+currentStep);
    if (prev) { prev.className='step done'; prev.innerHTML='<div class="step-dot"></div>✓ '+STEPS[currentStep]; }
  }
  currentStep = i;
  const cur = document.getElementById('st'+i);
  if (cur) cur.className = 'step active';
}

function showErr(msg) {
  document.getElementById('mc').innerHTML = `
    <div class="loading">

    <div class="card-head"><div class="card-icon ci-o">🔨</div><div class="card-title">Estimated Renovation Costs</div><div class="card-note">${f(r.sf)} SF · ${f(r.baths)} bath(s)</div></div>
    <table class="renov-table">
      <thead><tr><th>Item</th><th>Formula</th><th>Calculation</th><th style="text-align:right">Cost</th></tr></thead>
      <tbody>
        <tr><td>New Kitchen + Appliances</td><td>$180 × 10% of SF</td><td>$180 × ${Math.round((r.sf||0)*.1)}</td><td class="mono" style="text-align:right">$${(r.kitchen||0).toLocaleString()}</td></tr>
        <tr><td>New Bathrooms ×${r.baths||1}</td><td>$110 × 3% SF × baths</td><td>$110 × ${Math.round((r.sf||0)*.03)} × ${r.baths||1}</td><td class="mono" style="text-align:right">$${(r.bathrooms||0).toLocaleString()}</td></tr>
        <tr><td>Painting (Int/Ext)</td><td>$6 × SF</td><td>$6 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.painting||0).toLocaleString()}</td></tr>
        <tr><td>New Flooring</td><td>$11 × 80% SF</td><td>$11 × ${Math.round((r.sf||0)*.8)}</td><td class="mono" style="text-align:right">$${(r.flooring||0).toLocaleString()}</td></tr>
        <tr><td>New Roof</td><td>$15 × SF</td><td>$15 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.roof||0).toLocaleString()}</td></tr>
        <tr><td>New A/C</td><td>$6.50 × SF</td><td>$6.50 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.ac||0).toLocaleString()}</td></tr>
        <tr><td>Cleaning</td><td>$1.50 × SF</td><td>$1.50 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.cleaning||0).toLocaleString()}</td></tr>
        <tr><td>Gardens / Landscaping</td><td>$1.80 × SF</td><td>$1.80 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.gardens||0).toLocaleString()}</td></tr>
        <tr class="subt"><td colspan="3"><strong>Renovation Subtotal</strong></td><td class="mono" style="text-align:right"><strong>$${(r.renovSubtotal||0).toLocaleString()}</strong></td></tr>
        <tr><td>Miscellaneous</td><td>5% of subtotal</td><td>5% × $${(r.renovSubtotal||0).toLocaleString()}</td><td class="mono" style="text-align:right">$${(r.misc||0).toLocaleString()}</td></tr>
        <tr><td>Permits &amp; Related</td><td>3% of subtotal</td><td>3% × $${(r.renovSubtotal||0).toLocaleString()}</td><td class="mono" style="text-align:right">$${(r.permits||0).toLocaleString()}</td></tr>
        <tr><td>Hold Cost (6 months)</td><td>$2 × SF × 6</td><td>$2 × ${r.sf||0} × 6</td><td class="mono" style="text-align:right">$${(r.holdCost||0).toLocaleString()}</td></tr>
        <tr><td>Real Estate Commission</td><td>6% × (ARV + Renov)</td><td>6% × ($${arvN.toLocaleString()} + $${(r.renovSubtotal||0).toLocaleString()})</td><td class="mono" style="text-align:right">$${(r.commission||0).toLocaleString()}</td></tr>
        <tr class="tot"><td colspan="3"><strong>TOTAL GERAL</strong></td><td class="mono" style="text-align:right;color:#7fb3ff"><strong>$${(r.totalGeral||0).toLocaleString()}</strong></td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-icon ci-r">💰</div><div class="card-title">MAO — Maximum Allowable Offer</div><div class="card-note">ARV: ${f(arv.estimatedARV)} · All-in Cost: $${rT.toLocaleString()}</div></div>
    <div class="maogrid">
      <div class="mc mc60"><div class="mlabel">60% — Distressed / Probate</div><div class="mamount">${mao(.60)}</div><div class="mdesc">ARV × 60% − All-in Cost<br>Aggressive / Deep Wholesale</div></div>
      <div class="mc mc65"><div class="mlabel">65% — Deep Wholesale</div><div class="mamount">${mao(.65)}</div><div class="mdesc">ARV × 65% − All-in Cost<br>Strong investor margin</div></div>
      <div class="mc mc70"><div class="mlabel">70% — Standard Wholesale</div><div class="mamount">${mao(.70)}</div><div class="mdesc">ARV × 70% − All-in Cost<br>Flipper standard offer</div></div>
      <div class="mc mc75"><div class="mlabel">75% — Light Rehab</div><div class="mamount">${mao(.75)}</div><div class="mdesc">ARV × 75% − All-in Cost<br>Best-case / tight margin</div></div>
    </div>
    <div class="notes-bar"><p><strong>Recommended offer range: ${mao(.65)} – ${mao(.70)}.</strong> ${arv.notes||''}</p></div>
  </div>`;

  window._rpt = { addr, data: d, lead: rawLead };
}

// ── SAVE NOTE TO DEALMACHINE ──────────────────────────────────────
async function saveDM() {
  if (!window._rpt || !currentLead) { alert('No report to save.'); return; }
  const d=window._rpt.data, arv=d.arv||{}, r=d.renovation||{};
  const arvN = parseFloat(String(arv.estimatedARV||'0').replace(/[^0-9.]/g,''));
  const note = `=== WHOLESALE ANALYSIS — 123SoldCash.com ===
Date: ${new Date().toLocaleDateString()}
ARV: ${arv.estimatedARV||'—'} (range: ${arv.arvLow||'—'} – ${arv.arvHigh||'—'})
All-in Cost: $${(r.totalGeral||0).toLocaleString()}
MAO 60%: $${Math.round(arvN*.6-(r.totalGeral||0)).toLocaleString()}
MAO 65%: $${Math.round(arvN*.65-(r.totalGeral||0)).toLocaleString()}
MAO 70%: $${Math.round(arvN*.7-(r.totalGeral||0)).toLocaleString()}
Market: ${arv.marketTrend||'—'} | Investor Activity: ${arv.investorPct||'—'}
Active Investors: ${arv.activeInvestors||'None detected'}
Notes: ${arv.notes||''}`;
  try {
    const fd = new FormData();
    fd.append('note', note);
    const res = await fetch(`https://api.dealmachine.com/public/v1/leads/${currentLead.id}/create-note`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${DM_KEY}` },
      body: fd
    });
    if (!res.ok) throw new Error('Failed');
    alert('✅ Analysis saved as note in DealMachine!');
  } catch(e) {
    alert('Could not save to DealMachine: ' + e.message);
  }
}

// ── COPY LINK ─────────────────────────────────────────────────────
function copyLnk() {
  const a = document.getElementById('ain')?.value?.trim() || '';
  const url = location.origin + location.pathname + '?address=' + encodeURIComponent(a);
  navigator.clipboard.writeText(url)
    .then(() => alert('Link copied!\n\n' + url))
    .catch(() => prompt('Copy this link:', url));
}
</script>
