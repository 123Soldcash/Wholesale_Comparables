<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>123SoldCash — Wholesale Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f2244;--blue:#1a5cdb;--blue-bg:#eef4ff;--blue-bd:#c0d4ff;--orange:#e07b1a;--orange-bg:#fff4e6;--orange-bd:#fcd4a0;--green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;--red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;--amber-bg:#fffbeb;--amber:#92400e;--amber-bd:#fde68a;--g1:#f8f9fb;--g2:#f0f2f6;--g3:#e2e6ed;--g4:#9aa3b2;--g5:#6b7280;--tx:#1a1f2e;--tx2:#4b5568;--wh:#fff;--sh:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);--r:10px;--r2:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--g1);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.topbar{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-weight:700;font-size:15px;color:#fff}.logo span{color:#f5a443}
.tr{display:flex;align-items:center;gap:10px}
.badge-on{font-size:11px;color:#4ade80;display:flex;align-items:center;gap:5px;background:rgba(74,222,128,.1);padding:3px 10px;border-radius:20px;border:1px solid rgba(74,222,128,.2)}
.btn-xs{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#a8c4e8;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-decoration:none;display:inline-block}
.btn-xs:hover{background:rgba(255,255,255,.18);color:#fff}
.setup{max-width:500px;margin:52px auto;padding:0 16px}
.scard{background:var(--wh);border:1px solid var(--g3);border-radius:14px;overflow:hidden;box-shadow:var(--sh)}
.sh{background:var(--navy);padding:24px 28px}
.sh h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:5px}
.sh p{font-size:12px;color:#7fa8d8;line-height:1.6}
.sb{padding:28px}
.ibox{background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--r2);padding:12px 14px;margin-bottom:18px;font-size:12px;color:#1e40af;line-height:1.7}
.wbox{background:var(--orange-bg);border:1px solid var(--orange-bd);border-radius:var(--r2);padding:11px 13px;margin-bottom:18px;font-size:11px;color:#7a4500;line-height:1.6}
.wbox strong{color:var(--orange)}
.field{margin-bottom:18px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.field input{width:100%;padding:9px 13px;border:1.5px solid var(--g3);border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border-color .2s;background:var(--g1)}
.field input:focus{border-color:var(--blue);background:#fff}
.field input::placeholder{color:#b0b8c8}
.hint{font-size:11px;color:var(--g4);margin-top:4px;line-height:1.5}
.hint a{color:var(--blue)}
.err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}
.btn-connect{width:100%;background:var(--blue);color:#fff;border:none;padding:12px;border-radius:var(--r2);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-connect:hover{background:#1448b8}
.btn-connect:disabled{background:var(--g4);cursor:not-allowed}
.sbar{background:var(--wh);border-bottom:1px solid var(--g3);padding:10px 20px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.slabel{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.swrap{flex:1;min-width:200px;position:relative}
.swrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--g4)}
.sinput{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--g3);border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;background:var(--g1)}
.sinput:focus{border-color:var(--blue);background:#fff}
.sinput::placeholder{color:#b0b8c8}
.btn-go{background:var(--blue);color:#fff;border:none;padding:8px 18px;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-go:hover{background:#1448b8}
.btn-go:disabled{background:var(--g4);cursor:not-allowed}
.btn-sec{background:var(--g2);color:var(--tx2);border:1px solid var(--g3);padding:7px 13px;border-radius:7px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-sec:hover{background:var(--g3)}
.main{max-width:1180px;margin:0 auto;padding:18px 18px 60px}
.idle{text-align:center;padding:52px 20px;background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);box-shadow:var(--sh)}
.idle-icon{font-size:42px;margin-bottom:12px}
.idle h3{font-size:16px;font-weight:600;color:var(--tx);margin-bottom:8px}
.idle p{font-size:12px;color:var(--g4);max-width:380px;margin:0 auto 20px;line-height:1.7}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.chip{background:var(--g2);border:1px solid var(--g3);color:var(--tx2);font-size:11px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:background .15s}
.chip:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.leads-panel{background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:14px}
.ph{padding:11px 15px;border-bottom:1px solid var(--g3);background:var(--g1);display:flex;align-items:center;justify-content:space-between}
.ptitle{font-size:12px;font-weight:600;color:var(--tx2)}
.lrow{padding:10px 15px;border-bottom:1px solid var(--g3);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.lrow:last-child{border-bottom:none}
.lrow:hover{background:var(--blue-bg)}
.laddr{font-size:13px;font-weight:500;color:var(--tx);flex:1}
.lsub{font-size:11px;color:var(--tx2);margin-top:1px}
.lpill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--g2);color:var(--g5)}
.empty{padding:32px;text-align:center;color:var(--g4);font-size:13px}
.loading{text-align:center;padding:52px 20px;background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);box-shadow:var(--sh)}
.spin{width:36px;height:36px;border:3px solid var(--g3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading h3{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:5px}
.loading p{font-size:12px;color:var(--g4);margin-bottom:18px}
.steps{display:inline-flex;flex-direction:column;gap:7px;text-align:left}
.step{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--g4)}
.step.active{color:var(--blue);font-weight:600}
.step.done{color:var(--green)}
.step-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.rh{background:var(--navy);border-radius:var(--r);padding:18px 22px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.raddr{font-size:17px;font-weight:700;color:#fff;margin-bottom:3px}
.rmeta{font-size:11px;color:#7fa8d8}
.ract{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bact{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;border:none}
.bghost{background:rgba(255,255,255,.1);color:#c8d8f0;border:1px solid rgba(255,255,255,.2)!important}
.bghost:hover{background:rgba(255,255,255,.18);color:#fff}
.bsave{background:var(--orange);color:#fff}
.bsave:hover{background:#f5a443}
.card{background:var(--wh);border:1px solid var(--g3);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)}
.ch{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--g3);background:var(--g1)}
.ci{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ci-b{background:var(--blue-bg)}.ci-g{background:var(--green-bg)}.ci-o{background:var(--orange-bg)}.ci-r{background:var(--red-bg)}
.ct{font-size:13px;font-weight:600;color:var(--tx);flex:1}
.cs{font-size:11px;color:var(--g4)}
.dm-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;padding:2px 8px;border-radius:10px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}
.pc{padding:12px 15px;border-right:1px solid var(--g3);border-bottom:1px solid var(--g3)}
.pl{font-size:10px;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.pv{font-size:13px;font-weight:500;color:var(--tx)}
.pv.blue{color:var(--blue)}.pv.green{color:var(--green)}.pv.red{color:var(--red)}
.dpill{display:inline-block;background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em}
.tabs{display:flex;border-bottom:1px solid var(--g3);background:var(--wh);overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;margin-bottom:-1px;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--blue)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tbadge{background:var(--blue-bg);color:var(--blue);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.tp{display:none}.tp.active{display:block}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f4f6fb}
th{padding:9px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--g3);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--g3);color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7f9ff}
.btag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.bt-llc{background:var(--blue-bg);color:var(--blue)}
.bt-cash{background:var(--green-bg);color:var(--green)}
.bt-retail{background:var(--g2);color:var(--g5)}
.cg{color:var(--green);font-weight:600}.cf{color:var(--orange);font-weight:600}.cp{color:var(--red);font-weight:600}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--g3)}
.ac{background:var(--wh);padding:13px 15px}
.al{font-size:10px;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.av{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;color:var(--tx)}
.av.blue{color:var(--blue)}.av.orange{color:var(--orange)}
.maogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;padding:14px}
.mc{border-radius:8px;padding:14px;border:1.5px solid}
.mc60{background:var(--red-bg);border-color:var(--red-bd)}
.mc65{background:var(--orange-bg);border-color:var(--orange-bd)}
.mc70{background:var(--amber-bg);border-color:var(--amber-bd)}
.mc75{background:var(--green-bg);border-color:var(--green-bd)}
.ml{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.mc60 .ml{color:var(--red)}.mc65 .ml{color:var(--orange)}.mc70 .ml{color:var(--amber)}.mc75 .ml{color:var(--green)}
.ma{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--tx);margin-bottom:3px}
.md{font-size:11px;color:var(--tx2);line-height:1.5}
.rt{width:100%;border-collapse:collapse;font-size:12.5px}
.rt th{background:#f4f6fb;padding:9px 13px;text-align:left;font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--g3)}
.rt td{padding:9px 13px;border-bottom:1px solid var(--g3)}
.rt .sub td{background:var(--blue-bg);font-weight:600;color:var(--blue)}
.rt .tot td{background:var(--navy);color:#fff;font-weight:700;font-size:13px}
.ibar{padding:11px 15px;border-top:1px solid var(--g3);background:var(--blue-bg)}
.ibar p{font-size:12px;color:#1e40af;line-height:1.6}
.nbar{padding:11px 15px;border-top:1px solid var(--g3)}
.nbar p{font-size:12px;color:var(--tx2);line-height:1.6}
@media print{.topbar,.sbar,.ract{display:none!important}body{background:#fff}.card{box-shadow:none}}
@media(max-width:600px){.main{padding:12px 12px 48px}.pgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">123<span>SoldCash</span>.com</div>
  <div class="tr" id="tr">
    <a href="https://crmv3.manus.space" target="_blank" class="btn-xs">← CRM</a>
  </div>
</div>
<div id="app"></div>
<script>
'use strict';
let DM_KEY=localStorage.getItem('dm_key')||'';
let GM_KEY=localStorage.getItem('gm_key')||'';
let activeLead=null;
let stepIdx=-1;
const STEPS=['Searching your DealMachine leads...','Adding property to DealMachine, fetching data...','Real DealMachine data retrieved ✓','Gemini AI generating comp analysis...','Building wholesale report...'];

window.addEventListener('DOMContentLoaded',()=>{
  const q=new URLSearchParams(location.search);
  const addr=q.get('address')||q.get('property')||'';
  if(DM_KEY&&GM_KEY)showSearch(addr);
  else showSetup();
});

function showSetup(){
  document.getElementById('app').innerHTML=`
  <div class="setup"><div class="scard">
    <div class="sh"><h1>123SoldCash — Wholesale Analyzer</h1><p>Connect your API keys once. Stored only in your browser — never sent anywhere.</p></div>
    <div class="sb">
      <div class="ibox"><strong>🆓 100% Free:</strong><br>• DealMachine — your existing account<br>• Google Gemini — free tier, 1,500 analyses/day, no credit card</div>
      <div class="wbox"><strong>Security:</strong> Keys saved only in this browser's localStorage.</div>
      <div class="field">
        <label>DealMachine API Key</label>
        <input type="password" id="f-dm" placeholder="Paste your DealMachine Bearer token..." autocomplete="off">
        <div class="hint">DealMachine → Automation → API Docs → API Keys</div>
      </div>
      <div class="field">
        <label>Google Gemini API Key (Free)</label>
        <input type="password" id="f-gm" placeholder="AIza..." autocomplete="off">
        <div class="hint">Get free key: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> → Create API Key</div>
        <div class="err" id="serr"></div>
      </div>
      <button class="btn-connect" id="bcn" onclick="doConnect()">⚡ Connect & Start Analyzing</button>
    </div>
  </div></div>`;
  document.getElementById('f-dm').focus();
  ['f-dm','f-gm'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')doConnect();}));
}

async function doConnect(){
  const dm=document.getElementById('f-dm').value.trim();
  const gm=document.getElementById('f-gm').value.trim();
  const err=document.getElementById('serr');
  err.textContent='';
  if(!dm){err.textContent='Enter your DealMachine API key.';return;}
  if(!gm){err.textContent='Enter your Gemini API key.';return;}
  if(!gm.startsWith('AIza')){err.textContent='Gemini key must start with AIza...';return;}
  const btn=document.getElementById('bcn');
  btn.disabled=true;btn.textContent='Verifying Gemini key...';
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${gm}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:'Say OK'}]}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Invalid Gemini key.');}
    DM_KEY=dm;GM_KEY=gm;
    localStorage.setItem('dm_key',dm);
    localStorage.setItem('gm_key',gm);
    showSearch();
  }catch(e){
    err.textContent=e.message;
    btn.disabled=false;btn.textContent='⚡ Connect & Start Analyzing';
  }
}

function showSearch(autoAddr=''){
  document.getElementById('tr').innerHTML=`
    <div class="badge-on"><svg width="7" height="7" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#4ade80"/></svg>Connected</div>
    <a href="https://crmv3.manus.space" target="_blank" class="btn-xs">← CRM</a>
    <button class="btn-xs" onclick="doLogout()">Logout</button>`;
  document.getElementById('app').innerHTML=`
    <div class="sbar">
      <span class="slabel">Address</span>
      <div class="swrap">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <input class="sinput" id="ain" type="text" placeholder="e.g. 438 NE 2nd St, Pompano Beach, FL 33060" autocomplete="off">
      </div>
      <button class="btn-go" id="bgo" onclick="doAnalyze()">Analyze →</button>
      <button class="btn-sec" onclick="loadLeads()">My DM Leads</button>
    </div>
    <div class="main" id="main">
      <div class="idle">
        <div class="idle-icon">🏠</div>
        <h3>DealMachine + Gemini Wholesale Analyzer</h3>
        <p>Real property data from DealMachine + Gemini AI comp analysis.<br>Identifies LLC/Investor vs. Retail buyers. Calculates ARV & MAO.</p>
        <div class="chips">
          <span class="chip" onclick="useAddr('438 NE 2nd St, Pompano Beach, FL 33060')">438 NE 2nd St, Pompano Beach FL</span>
          <span class="chip" onclick="useAddr('19905 SW 147th Ave, Miami, FL 33187')">19905 SW 147th Ave, Miami FL</span>
        </div>
      </div>
    </div>`;
  document.getElementById('ain').addEventListener('keydown',e=>{if(e.key==='Enter')doAnalyze();});
  if(autoAddr){document.getElementById('ain').value=autoAddr;doAnalyze();}
}

function useAddr(a){document.getElementById('ain').value=a;doAnalyze();}
function doLogout(){localStorage.clear();DM_KEY='';GM_KEY='';showSetup();}

async function loadLeads(){
  setMain(`<div class="loading"><div class="spin"></div><h3>Loading your DealMachine leads...</h3></div>`);
  try{
    const r=await dmFetch('GET','leads/?limit=50&after=0');
    const leads=Array.isArray(r.data)?r.data:[];
    if(!leads.length){setMain(`<div class="leads-panel"><div class="empty">No leads found. Enter an address above.</div></div>`);return;}
    setMain(`<div class="leads-panel">
      <div class="ph"><span class="ptitle">Your DealMachine Leads — click to analyze</span><span class="dm-badge">✓ Live Data</span></div>
      ${leads.map(l=>{
        const p=l.property||{};
        const addr=[p.address,p.city,p.state,p.zip].filter(Boolean).join(', ')||'Unknown';
        const meta=[p.beds&&p.beds+'bd',p.baths&&p.baths+'ba',p.square_feet&&p.square_feet+'sf',p.estimated_value&&'$'+Number(p.estimated_value).toLocaleString()].filter(Boolean).join(' · ');
        return `<div class="lrow" onclick="analyzeByLead('${l.id}','${addr.replace(/'/g,"\\'")}')">
          <div style="flex:1"><div class="laddr">${addr}</div><div class="lsub">${meta}</div></div>
          <span class="lpill">${l.lead_status?.label||'—'}</span>
          <span style="color:var(--g4);font-size:16px">›</span>
        </div>`;
      }).join('')}
    </div>`);
  }catch(e){setMain(`<div class="loading"><p style="color:var(--red)">${e.message}</p></div>`);}
}

async function analyzeByLead(id,addr){
  document.getElementById('ain').value=addr;
  showLoading(addr);
  try{
    const j=await dmFetch('GET',`leads/${id}`);
    activeLead=j.data||j;advStep(2);await runGemini(activeLead);
  }catch(e){showErr(e.message);}
}

async function doAnalyze(){
  const addr=document.getElementById('ain')?.value?.trim();
  if(!addr){document.getElementById('ain')?.focus();return;}
  document.getElementById('bgo').disabled=true;
  showLoading(addr);
  try{
    advStep(0);
    const ex=await dmFetch('GET','leads/?limit=100&after=0');
    const leads=Array.isArray(ex.data)?ex.data:[];
    const needle=addr.toLowerCase().replace(/[,.]/g,'');
    let lead=leads.find(l=>{
      const p=l.property||{};
      const hay=[p.address,p.city,p.state,p.zip].join(' ').toLowerCase().replace(/[,.]/g,'');
      return needle.split(' ').slice(0,3).filter(Boolean).every(w=>hay.includes(w));
    });
    if(!lead){
      advStep(1);
      const parts=addr.split(',').map(s=>s.trim());
      const fd=new FormData();
      if(parts.length>=3){fd.append('address',parts[0]);fd.append('city',parts[1]||'');const sp=(parts[2]||'').trim().split(' ');fd.append('state',sp[0]||'');fd.append('zip',sp[1]||'');}
      else fd.append('full_address',addr);
      const added=await dmFetch('POST','leads/',fd);
      lead=added.data||added;
    }
    activeLead=lead;advStep(2);await runGemini(lead);
  }catch(e){showErr(e.message);}
  finally{const b=document.getElementById('bgo');if(b)b.disabled=false;}
}

async function dmFetch(method,path,body){
  const opts={method,headers:{'Authorization':`Bearer ${DM_KEY}`}};
  if(body)opts.body=body;
  const r=await fetch(`https://api.dealmachine.com/public/v1/${path}`,opts);
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.message||`DealMachine error ${r.status}`);
  return j;
}

    vacant:p.vacant,lien_count:p.lien_count,deed_type:p.deed_type

  const prompt=`You are a Wholesale Real Estate Expert. Analyze this property for wholesale investing.

REAL DealMachine data:
${JSON.stringify(dmData,null,2)}

BUYER TYPE for every comp:

function mergeData(ai,dm,addr){
  return{...ai,address:addr,
    owner:dm.owner||ai.owner,
    sf:dm.square_feet||ai.sf,yearBuilt:dm.year_built||ai.yearBuilt,
    beds:dm.beds||ai.beds,baths:dm.baths||ai.baths,
    lotSize:dm.lot_size_sqft?Number(dm.lot_size_sqft).toLocaleString()+' sf':ai.lotSize,
    lastSaleAmount:dm.last_sale_amount?'$'+Number(dm.last_sale_amount).toLocaleString():ai.lastSaleAmount,
    lastSaleDate:dm.last_sale_date||ai.lastSaleDate,
    estimatedValue:(dm.estimated_value||dm.avm_value)?'$'+Number(dm.estimated_value||dm.avm_value).toLocaleString():ai.estimatedValue,
    equity:dm.equity_percent?Math.round(dm.equity_percent)+'%':ai.equity,

  try{
    const fd=new FormData();fd.append('note',note);
    await dmFetch('POST',`leads/${activeLead.id}/create-note`,fd);
    alert('✅ Analysis saved to DealMachine!');
  }catch(e){alert('Error: '+e.message);}
}

function copyLink(){
  const a=document.getElementById('ain')?.value?.trim()||'';
  const url=location.origin+location.pathname+'?address='+encodeURIComponent(a);
  navigator.clipboard.writeText(url).then(()=>alert('Link copied!\n\n'+url)).catch(()=>prompt('Copy:',url));
}
</script>
