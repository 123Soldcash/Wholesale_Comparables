<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>123SoldCash — Wholesale Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0f2244; --blue:#1a5cdb; --blue-bg:#eef4ff; --blue-bd:#c0d4ff;
  --orange:#e07b1a; --orange-bg:#fff4e6; --orange-bd:#fcd4a0;
  --green:#16a34a; --green-bg:#f0fdf4; --green-bd:#bbf7d0;
  --red:#dc2626; --red-bg:#fef2f2; --red-bd:#fecaca;
  --amber-bg:#fffbeb; --amber:#92400e; --amber-bd:#fde68a;
  --g1:#f8f9fb; --g2:#f0f2f6; --g3:#e2e6ed; --g4:#9aa3b2; --g5:#6b7280;
  --tx:#1a1f2e; --tx2:#4b5568; --wh:#fff;
  --sh:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:var(--g1); color:var(--tx); font-size:14px; line-height:1.5; min-height:100vh; }

/* TOPBAR */
.topbar { background:var(--navy); display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:50px; position:sticky; top:0; z-index:300; box-shadow:0 2px 8px rgba(0,0,0,.25); }
.logo { font-weight:700; font-size:15px; color:#fff; }
.logo span { color:#f5a443; }
.topbar-r { display:flex; align-items:center; gap:10px; }
.badge-on { font-size:11px; color:#4ade80; display:flex; align-items:center; gap:5px; background:rgba(74,222,128,.1); padding:3px 10px; border-radius:20px; border:1px solid rgba(74,222,128,.2); }
.btn-xs { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:#a8c4e8; padding:4px 12px; border-radius:6px; font-size:11px; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; text-decoration:none; display:inline-block; }
.btn-xs:hover { background:rgba(255,255,255,.18); color:#fff; }

/* SETUP */
.setup { max-width:500px; margin:52px auto; padding:0 16px; }
.scard { background:var(--wh); border:1px solid var(--g3); border-radius:14px; overflow:hidden; box-shadow:var(--sh); }
.scard-head { background:var(--navy); padding:24px 28px; }
.scard-head h1 { font-size:18px; font-weight:700; color:#fff; margin-bottom:5px; }
.scard-head p { font-size:12px; color:#7fa8d8; line-height:1.6; }
.scard-body { padding:28px; }
.ibox { background:var(--blue-bg); border:1px solid var(--blue-bd); border-radius:8px; padding:12px 14px; margin-bottom:18px; font-size:12px; color:#1e40af; line-height:1.7; }
.wbox { background:var(--orange-bg); border:1px solid var(--orange-bd); border-radius:8px; padding:11px 13px; margin-bottom:18px; font-size:11px; color:#7a4500; }
.wbox strong { color:var(--orange); }
.field { margin-bottom:18px; }
.field label { display:block; font-size:10px; font-weight:600; color:var(--tx2); text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px; }
.field input { width:100%; padding:9px 13px; border:1.5px solid var(--g3); border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; color:var(--tx); outline:none; transition:border-color .2s; background:var(--g1); }
.field input:focus { border-color:var(--blue); background:#fff; }
.field input::placeholder { color:#b0b8c8; }
.field .hint { font-size:11px; color:var(--g4); margin-top:4px; line-height:1.5; }
.field .hint a { color:var(--blue); }
.err { color:var(--red); font-size:12px; margin-top:6px; min-height:16px; }
.btn-connect { width:100%; background:var(--blue); color:#fff; border:none; padding:12px; border-radius:8px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background .2s; }
.btn-connect:hover { background:#1448b8; }
.btn-connect:disabled { background:var(--g4); cursor:not-allowed; }

/* SEARCH BAR */
.sbar { background:var(--wh); border-bottom:1px solid var(--g3); padding:10px 20px; display:flex; gap:9px; align-items:center; flex-wrap:wrap; }
.sbar-label { font-size:10px; font-weight:600; color:var(--tx2); text-transform:uppercase; letter-spacing:.07em; white-space:nowrap; }
.sbar-wrap { flex:1; min-width:200px; position:relative; }
.sbar-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--g4); }
.sbar-input { width:100%; padding:8px 12px 8px 32px; border:1.5px solid var(--g3); border-radius:7px; font-family:'Inter',sans-serif; font-size:13px; outline:none; transition:border-color .2s; background:var(--g1); }
.sbar-input:focus { border-color:var(--blue); background:#fff; }
.sbar-input::placeholder { color:#b0b8c8; }
.btn-go { background:var(--blue); color:#fff; border:none; padding:8px 18px; border-radius:7px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:background .2s; }
.btn-go:hover { background:#1448b8; }
.btn-go:disabled { background:var(--g4); cursor:not-allowed; }
.btn-sec { background:var(--g2); color:var(--tx2); border:1px solid var(--g3); padding:7px 13px; border-radius:7px; font-family:'Inter',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; white-space:nowrap; }
.btn-sec:hover { background:var(--g3); }
.btn-gh { background:var(--navy); color:#fff; border:none; padding:7px 14px; border-radius:7px; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; text-decoration:none; display:inline-flex; align-items:center; gap:5px; }
.btn-gh:hover { background:#1a3a6b; }

/* MAIN */
.main { max-width:1180px; margin:0 auto; padding:18px 18px 60px; }

/* IDLE */
.idle { text-align:center; padding:52px 20px; background:var(--wh); border:1px solid var(--g3); border-radius:10px; box-shadow:var(--sh); }
.idle-icon { font-size:42px; margin-bottom:12px; }
.idle h3 { font-size:16px; font-weight:600; color:var(--tx); margin-bottom:8px; }
.idle p { font-size:12px; color:var(--g4); max-width:420px; margin:0 auto 20px; line-height:1.7; }
.idle-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
.chips { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.chip { background:var(--g2); border:1px solid var(--g3); color:var(--tx2); font-size:11px; padding:5px 14px; border-radius:20px; cursor:pointer; transition:background .15s; }
.chip:hover { background:var(--blue-bg); color:var(--blue); border-color:var(--blue-bd); }

/* CARDS */
.card { background:var(--wh); border:1px solid var(--g3); border-radius:10px; overflow:hidden; margin-bottom:12px; box-shadow:var(--sh); }
.card-head { display:flex; align-items:center; gap:8px; padding:11px 16px; border-bottom:1px solid var(--g3); background:var(--g1); }
.cicon { width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.ci-b { background:var(--blue-bg); } .ci-g { background:var(--green-bg); } .ci-o { background:var(--orange-bg); } .ci-r { background:var(--red-bg); }
.card-title { font-size:13px; font-weight:600; color:var(--tx); flex:1; }
.card-sub { font-size:11px; color:var(--g4); }
.dm-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; padding:2px 8px; border-radius:10px; }

/* PROPERTY GRID */
.pgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); }
.pc { padding:12px 15px; border-right:1px solid var(--g3); border-bottom:1px solid var(--g3); }
.pl { font-size:10px; font-weight:600; color:var(--g4); text-transform:uppercase; letter-spacing:.07em; margin-bottom:3px; }
.pv { font-size:13px; font-weight:500; color:var(--tx); }
.pv.blue { color:var(--blue); } .pv.green { color:var(--green); } .pv.red { color:var(--red); } .pv.orange { color:var(--orange); }
.dpill { display:inline-block; background:var(--orange-bg); color:var(--orange); border:1px solid var(--orange-bd); font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--g3); background:var(--wh); overflow-x:auto; }
.tab { padding:10px 16px; font-size:12px; font-weight:500; color:var(--tx2); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; margin-bottom:-1px; display:flex; align-items:center; gap:5px; }
.tab:hover { color:var(--blue); }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:600; }
.tbadge { background:var(--blue-bg); color:var(--blue); font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; }
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* TABLES */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead tr { background:#f4f6fb; }
th { padding:9px 10px; text-align:left; font-size:10px; font-weight:700; color:var(--g4); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--g3); white-space:nowrap; }
td { padding:9px 10px; border-bottom:1px solid var(--g3); color:var(--tx); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#f7f9ff; }
.btag { display:inline-block; font-size:10px; font-weight:600; padding:2px 7px; border-radius:8px; }
.bt-llc { background:var(--blue-bg); color:var(--blue); }
.bt-cash { background:var(--green-bg); color:var(--green); }
.bt-retail { background:var(--g2); color:var(--g5); }
.cg { color:var(--green); font-weight:600; } .cf { color:var(--orange); font-weight:600; } .cp { color:var(--red); font-weight:600; }
.mono { font-family:'JetBrains Mono',monospace; font-size:12px; }

/* PHOTO */
.comp-photo { width:80px; height:60px; object-fit:cover; border-radius:6px; border:1px solid var(--g3); flex-shrink:0; }
.comp-photo-err { width:80px; height:60px; border-radius:6px; border:1px solid var(--g3); background:var(--g2); display:flex; align-items:center; justify-content:center; font-size:20px; }

/* SOURCE LINKS */
.src-links { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.sl { font-size:10px; font-weight:600; padding:2px 7px; border-radius:6px; text-decoration:none; display:inline-block; }
.sl:hover { opacity:.8; }
.sl-z { background:var(--blue-bg); color:var(--blue); }
.sl-r { background:var(--red-bg); color:var(--red); }
.sl-g { background:var(--g2); color:var(--g5); }
.sl-pa { background:var(--green-bg); color:var(--green); }
.sl-sb { background:var(--orange-bg); color:var(--orange); }

/* ARV */
.agrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:1px; background:var(--g3); }
.ac { background:var(--wh); padding:13px 15px; }
.al { font-size:10px; font-weight:600; color:var(--g4); text-transform:uppercase; letter-spacing:.07em; margin-bottom:4px; }
.av { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:500; color:var(--tx); }
.av.blue { color:var(--blue); } .av.orange { color:var(--orange); }

/* MAO */
.maogrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:10px; padding:14px; }
.mc { border-radius:8px; padding:14px; border:1.5px solid; }
.mc60 { background:var(--red-bg); border-color:var(--red-bd); }
.mc65 { background:var(--orange-bg); border-color:var(--orange-bd); }
.mc70 { background:var(--amber-bg); border-color:var(--amber-bd); }
.mc75 { background:var(--green-bg); border-color:var(--green-bd); }
.ml { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; margin-bottom:5px; }
.mc60 .ml { color:var(--red); } .mc65 .ml { color:var(--orange); } .mc70 .ml { color:var(--amber); } .mc75 .ml { color:var(--green); }
.ma { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:500; color:var(--tx); margin-bottom:3px; }
.md { font-size:11px; color:var(--tx2); line-height:1.5; }

/* RENOVATION */
.rtable { width:100%; border-collapse:collapse; font-size:12.5px; }
.rtable th { background:#f4f6fb; padding:9px 13px; text-align:left; font-size:10px; font-weight:700; color:var(--g4); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--g3); }
.rtable td { padding:9px 13px; border-bottom:1px solid var(--g3); }
.rtable .sub td { background:var(--blue-bg); font-weight:600; color:var(--blue); }
.rtable .tot td { background:var(--navy); color:#fff; font-weight:700; font-size:13px; }

/* BARS */
.ibar { padding:11px 15px; border-top:1px solid var(--g3); background:var(--blue-bg); }
.ibar p { font-size:12px; color:#1e40af; line-height:1.6; }
.nbar { padding:11px 15px; border-top:1px solid var(--g3); }
.nbar p { font-size:12px; color:var(--tx2); line-height:1.6; }
.gbar { padding:11px 15px; border-top:1px solid var(--g3); background:var(--green-bg); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.gbar p { font-size:12px; color:#14532d; flex:1; }

/* LOADING */
.loading { text-align:center; padding:52px 20px; background:var(--wh); border:1px solid var(--g3); border-radius:10px; box-shadow:var(--sh); }
.spin { width:36px; height:36px; border:3px solid var(--g3); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading h3 { font-size:15px; font-weight:600; color:var(--tx); margin-bottom:5px; }
.loading p { font-size:12px; color:var(--g4); margin-bottom:18px; }
.steps { display:inline-flex; flex-direction:column; gap:7px; text-align:left; }
.step { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--g4); }
.step.active { color:var(--blue); font-weight:600; }
.step.done { color:var(--green); }
.step-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* REPORT HEADER */
.rh { background:var(--navy); border-radius:10px; padding:18px 22px; margin-bottom:14px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.raddr { font-size:17px; font-weight:700; color:#fff; margin-bottom:3px; }
.rmeta { font-size:11px; color:#7fa8d8; }
.ract { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.ba { padding:6px 14px; border-radius:7px; font-size:11px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; border:none; }
.ba-ghost { background:rgba(255,255,255,.1); color:#c8d8f0; border:1px solid rgba(255,255,255,.2)!important; }
.ba-ghost:hover { background:rgba(255,255,255,.18); color:#fff; }
.ba-save { background:var(--orange); color:#fff; }
.ba-save:hover { background:#f5a443; }
.empty { padding:24px; text-align:center; color:var(--g4); font-size:13px; }

@media print { .topbar, .sbar, .ract { display:none!important; } body { background:#fff; } .card { box-shadow:none; } }
@media (max-width:600px) { .main { padding:12px 12px 48px; } .pgrid { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">123<span>SoldCash</span>.com</div>
  <div class="topbar-r" id="topbar-r">
    <a href="https://crmv3.manus.space" target="_blank" class="btn-xs">← CRM</a>
  </div>
</div>

<div id="app"></div>

<script>
const GITHUB_USER = '123Soldcash';
const GITHUB_REPO = 'Wholesale_Comparables';
const ACTIONS_URL  = `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/actions`;
const RAW_JSON     = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/comps_result.json`;

let DM_KEY = localStorage.getItem('dm_key') || '';
let GM_KEY = localStorage.getItem('gm_key') || '';
let activeLead = null;
let stepIdx = -1;

const STEPS = [
  'Searching your DealMachine leads...',
  'Adding property to DealMachine...',
  'Real DealMachine data retrieved ✓',
  'Gemini AI generating comp analysis...',
  'Building wholesale report...'
];

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const q = new URLSearchParams(location.search);
  const addr = q.get('address') || q.get('property') || '';
  if (DM_KEY && GM_KEY) showSearch(addr);
  else showSetup();
});

// ── HELPERS ───────────────────────────────────────────────────────
const f  = v => v || '—';
const fm = v => v ? (typeof v === 'number' ? '$' + v.toLocaleString() : v) : '—';
function setMain(h) { document.getElementById('main').innerHTML = h; }

function switchTab(id, el) {
  document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tp-' + id)?.classList.add('active');
  el.classList.add('active');
}

function btTag(t) {
  if (!t) return '<span class="btag bt-retail">Retail</span>';
  const u = t.toUpperCase();
  if (u.includes('LLC') || u.includes('INVESTOR')) return '<span class="btag bt-llc">🏢 LLC/Investor</span>';
  if (u.includes('CASH')) return '<span class="btag bt-cash">💵 Cash</span>';
  return '<span class="btag bt-retail">🏠 Retail</span>';
}

function condTag(c) {
  if (!c) return '—';
  const l = c.toLowerCase();
  if (l.includes('good') || l.includes('excel')) return `<span class="cg">${c}</span>`;
  if (l.includes('poor') || l.includes('bad'))   return `<span class="cp">${c}</span>`;
  return `<span class="cf">${c}</span>`;
}

function photoCell(addr) {
  const url = `https://maps.googleapis.com/maps/api/streetview?size=120x90&location=${encodeURIComponent(addr || '')}`;
  return `<img class="comp-photo" src="${url}" alt="" onerror="this.outerHTML='<div class=\\'comp-photo-err\\'>🏠</div>'">`;
}

function srcLinks(c) {
  const links = [];
  const addr = encodeURIComponent(c.address || '');
  if (c.sourceUrl) {
    links.push(`<a href="${c.sourceUrl}" target="_blank" class="sl sl-${c.source === 'Redfin' ? 'r' : 'z'}">${c.source || 'Source'} ↗</a>`);
  } else {
    links.push(`<a href="https://www.zillow.com/homes/${addr}_rb/" target="_blank" class="sl sl-z">Zillow ↗</a>`);
    links.push(`<a href="https://www.redfin.com/FL/${addr}" target="_blank" class="sl sl-r">Redfin ↗</a>`);
  }
  if (c.googleMapsUrl) links.push(`<a href="${c.googleMapsUrl}" target="_blank" class="sl sl-g">Maps ↗</a>`);
  if (c.sunbizUrl)     links.push(`<a href="${c.sunbizUrl}" target="_blank" class="sl sl-sb">Sunbiz ↗</a>`);
  if (c.paUrl)         links.push(`<a href="${c.paUrl}" target="_blank" class="sl sl-pa">County PA ↗</a>`);
  return links.length ? `<div class="src-links">${links.join('')}</div>` : '';
}

// ── SETUP ─────────────────────────────────────────────────────────
function showSetup() {
  document.getElementById('app').innerHTML = `
  <div class="setup">
    <div class="scard">
      <div class="scard-head">
        <h1>123SoldCash — Wholesale Analyzer</h1>
        <p>Enter your API keys once. Stored only in this browser — never sent anywhere.</p>
      </div>
      <div class="scard-body">
        <div class="ibox">
          <strong>🆓 100% Free to start:</strong><br>
          • DealMachine — your existing account<br>
          • Google Gemini — free tier, 1,500 analyses/day, no credit card
        </div>
        <div class="wbox"><strong>Security:</strong> Keys saved only in this browser's localStorage.</div>
        <div class="field">
          <label>DealMachine API Key</label>
          <input type="password" id="f-dm" placeholder="Paste your DealMachine Bearer token..." autocomplete="off">
          <div class="hint">DealMachine → Automation → API Docs → API Keys</div>
        </div>
        <div class="field">
          <label>Google Gemini API Key (Free)</label>
          <input type="password" id="f-gm" placeholder="AIza..." autocomplete="off">
          <div class="hint">Get free key: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> → Create API Key</div>
          <div class="err" id="setup-err"></div>
        </div>
        <button class="btn-connect" id="btn-connect" onclick="doConnect()">⚡ Connect & Start Analyzing</button>
      </div>
    </div>
  </div>`;
  document.getElementById('f-dm').focus();
  ['f-dm','f-gm'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doConnect(); });
  });
}

async function doConnect() {
  const dm  = document.getElementById('f-dm').value.trim();
  const gm  = document.getElementById('f-gm').value.trim();
  const err = document.getElementById('setup-err');
  err.textContent = '';
  if (!dm) { err.textContent = 'Enter your DealMachine API key.'; return; }
  if (!gm) { err.textContent = 'Enter your Gemini API key (AIza...).'; return; }
  if (!gm.startsWith('AIza')) { err.textContent = 'Gemini key must start with AIza...'; return; }
  // Save keys directly — no network validation to avoid quota issues
  DM_KEY = dm; GM_KEY = gm;
  localStorage.setItem('dm_key', dm);
  localStorage.setItem('gm_key', gm);
  showSearch();
}

// ── SEARCH SCREEN ─────────────────────────────────────────────────
function showSearch(autoAddr = '') {
  document.getElementById('topbar-r').innerHTML = `

// ── LOAD REAL COMPS FROM GITHUB ───────────────────────────────────
async function loadRealComps() {
  setMain(`<div class="loading"><div class="spin"></div><h3>Loading real comps from GitHub...</h3><p>Reading Python analysis results</p></div>`);
  try {
    const r = await fetch(RAW_JSON + '?t=' + Date.now());
    if (!r.ok) throw new Error('No results found. Run the Python analysis first via GitHub Actions.');
    const data = await r.json();
    if (data.address) document.getElementById('ain').value = data.address;
    renderRealReport(data);
  } catch(e) {
    setMain(`<div class="loading">
      <div style="font-size:32px;margin-bottom:12px">📂</div>
      <h3>No results yet</h3>
      <p style="margin-bottom:20px">${e.message}</p>
      <a href="${ACTIONS_URL}" target="_blank" class="btn-gh" style="display:inline-flex">⚙️ Run Python Analysis on GitHub →</a>
    </div>`);
  }
}

// ── ANALYZE BY LEAD ───────────────────────────────────────────────
async function analyzeByLead(id, addr) {
  document.getElementById('ain').value = addr;
  showLoading(addr);
  try {
    const j = await dmFetch('GET', `leads/${id}`);
    activeLead = j.data || j;
    advStep(2);
    await runGemini(activeLead);
  } catch(e) { showErr(e.message); }
}

// ── ANALYZE BY ADDRESS ────────────────────────────────────────────
async function doAnalyze() {
  const addr = document.getElementById('ain')?.value?.trim();
  if (!addr) { document.getElementById('ain')?.focus(); return; }
  document.getElementById('btn-go').disabled = true;
  showLoading(addr);
  try {
    advStep(0);
    const ex = await dmFetch('GET', 'leads/?limit=100&after=0');
    const leads = Array.isArray(ex.data) ? ex.data : [];
    const needle = addr.toLowerCase().replace(/[,.]/g, '');
    let lead = leads.find(l => {
      const p = l.property || {};
      const hay = [p.address,p.city,p.state,p.zip].join(' ').toLowerCase().replace(/[,.]/g,'');
      return needle.split(' ').slice(0,3).filter(Boolean).every(w => hay.includes(w));
    });
    if (!lead) {
      advStep(1);
      const parts = addr.split(',').map(s => s.trim());
      const fd = new FormData();
      if (parts.length >= 3) {
        fd.append('address', parts[0]);
        fd.append('city', parts[1] || '');
        const sp = (parts[2] || '').trim().split(' ');
        fd.append('state', sp[0] || '');
        fd.append('zip', sp[1] || '');
      } else { fd.append('full_address', addr); }
      const added = await dmFetch('POST', 'leads/', fd);
      lead = added.data || added;
    }
    activeLead = lead;
    advStep(2);
    await runGemini(lead);
  } catch(e) { showErr(e.message); }
  finally { const b = document.getElementById('btn-go'); if (b) b.disabled = false; }
}

// ── DM FETCH ─────────────────────────────────────────────────────
async function dmFetch(method, path, body) {
  const opts = { method, headers: { 'Authorization': `Bearer ${DM_KEY}` } };
  if (body) opts.body = body;
  const r = await fetch(`https://api.dealmachine.com/public/v1/${path}`, opts);
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.message || `DealMachine error ${r.status}`);
  return j;
}

// ── GEMINI AI ANALYSIS ────────────────────────────────────────────
async function runGemini(lead) {
  advStep(3);
  const p = lead.property || lead;
  const addr = [p.address,p.city,p.state,p.zip].filter(Boolean).join(', ') || lead.full_address || 'Unknown';
  const dmData = {
    address: addr,
    owner: [p.owner_first_name,p.owner_last_name].filter(Boolean).join(' ') || p.owner_name || null,
    beds: p.beds||p.bedrooms, baths: p.baths||p.bathrooms,
    square_feet: p.square_feet||p.sqft, lot_size_sqft: p.lot_size_sqft||p.lot_size,
    year_built: p.year_built, property_type: p.property_type||p.use_type,
    estimated_value: p.estimated_value||p.avm_value,
    last_sale_amount: p.last_sale_amount||p.last_sale_price, last_sale_date: p.last_sale_date,
    equity_percent: p.equity_percent, mortgage_balance: p.mortgage_balance||p.open_mortgage_amount,
    tax_delinquent: p.tax_delinquent, in_foreclosure: p.foreclosure||p.in_foreclosure,
    absentee_owner: p.absentee_owner, vacant: p.vacant, lien_count: p.lien_count, deed_type: p.deed_type
  };
  const prompt = `You are a Wholesale Real Estate Expert. Analyze this Florida property.
REAL DealMachine data: ${JSON.stringify(dmData,null,2)}
BUYER TYPE: "LLC/INVESTOR"=name has LLC/Corp/Inc/Holdings/Properties/Investments/Group/Capital/Trust/Fund; "CASH BUYER"=individual no mortgage; "RETAIL BUYER"=individual financed.
Return ONLY valid JSON no markdown:
{"property":{"address":"","owner":"","sf":"","yearBuilt":"","style":"","beds":"","baths":"","lotSize":"","lastSaleAmount":"","lastSaleDate":"","deed":"","estimatedValue":"","taxStatus":"","distress":"","openLiens":"","equity":"","mortgageBalance":""},"sold6":[{"address":"","beds":"","baths":"","sf":"","lotSf":"","yearBuilt":"","distance":"","saleDate":"","price":"","priceSF":"","buyerName":"","buyerType":"","condition":""}],"sold12":[],"pending":[{"address":"","beds":"","baths":"","sf":"","distance":"","listedDate":"","listPrice":"","priceSF":"","dom":"","condition":""}],"forSale":[],"forRent":[{"address":"","beds":"","baths":"","sf":"","distance":"","listedDate":"","monthlyRent":"","rentSF":"","dom":"","condition":""}],"arv":{"avgPriceSF6mo":"","avgPriceSF12mo":"","estimatedARV":"","arvLow":"","arvHigh":"","cashSalePct":"","investorPct":"","dominantBuyer":"","marketTrend":"","avgDOM":"","activeInvestors":"","notes":""},"renovation":{"sf":0,"baths":0,"kitchen":0,"bathrooms":0,"painting":0,"flooring":0,"roof":0,"ac":0,"cleaning":0,"gardens":0,"renovSubtotal":0,"misc":0,"permits":0,"holdCost":0,"commission":0,"totalGeral":0}}
Rules: sold6=5-6 comps last 6mo 1-mile; sold12=5-6 comps mo 7-12; pending=2-3; forSale=3-4; forRent=2-3.
Renovation: kitchen=$180×10%SF, bathrooms=$110×3%SF×baths, painting=$6×SF, flooring=$11×80%SF, roof=$15×SF, ac=$6.5×SF, cleaning=$1.5×SF, gardens=$1.8×SF, misc=5%×renovSubtotal, permits=3%×renovSubtotal, holdCost=$2×SF×6, commission=6%×(estimatedARV+renovSubtotal).`;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GM_KEY}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.2,maxOutputTokens:8192,responseMimeType:'application/json'} })
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `Gemini error ${res.status}`); }
    const d = await res.json();
    const raw = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g,'').trim();
    const si = clean.indexOf('{'), ei = clean.lastIndexOf('}');
    if (si === -1) throw new Error('Could not parse response. Try again.');
    const result = JSON.parse(clean.slice(si, ei+1));
    result.property = mergeData(result.property, dmData, addr);
    advStep(4);
    renderAIReport(addr, result);
  } catch(e) { showErr(e.message); }
}

// ── MERGE DM DATA ─────────────────────────────────────────────────
function mergeData(ai, dm, addr) {
  return { ...ai, address: addr,
    owner: [dm.owner_first_name||'',dm.owner_last_name||''].join(' ').trim() || dm.owner || ai.owner,
    sf: dm.square_feet||ai.sf, yearBuilt: dm.year_built||ai.yearBuilt,
    beds: dm.beds||ai.beds, baths: dm.baths||ai.baths,
    lotSize: dm.lot_size_sqft ? Number(dm.lot_size_sqft).toLocaleString()+' sf' : ai.lotSize,
    lastSaleAmount: dm.last_sale_amount ? '$'+Number(dm.last_sale_amount).toLocaleString() : ai.lastSaleAmount,
    lastSaleDate: dm.last_sale_date||ai.lastSaleDate,
    estimatedValue: (dm.estimated_value||dm.avm_value) ? '$'+Number(dm.estimated_value||dm.avm_value).toLocaleString() : ai.estimatedValue,
    equity: dm.equity_percent ? Math.round(dm.equity_percent)+'%' : ai.equity,
    mortgageBalance: dm.mortgage_balance ? '$'+Number(dm.mortgage_balance).toLocaleString() : ai.mortgageBalance,
    taxStatus: dm.tax_delinquent ? `DELINQUENT — $${Number(dm.tax_delinquent_amount||0).toLocaleString()} owed` : (ai.taxStatus||'Current'),
    distress: [dm.in_foreclosure&&'Foreclosure', dm.tax_delinquent&&'Tax Delinquent',
      dm.vacant&&'Vacant', dm.absentee_owner&&'Absentee Owner', dm.lien_count>0&&dm.lien_count+' Lien(s)']
      .filter(Boolean).join(' / ') || ai.distress || 'None',
    openLiens: dm.lien_count>0 ? dm.lien_count+' lien(s)' : (ai.openLiens||'None'),
    deed: dm.deed_type||ai.deed, _real: true };
}

  const rT = r.totalGeral||0;
  const mao = pct => arvN ? '$'+Math.round(arvN*pct-rT).toLocaleString() : '—';

  const soldRows = cs => {
    if (!cs?.length) return '<div class="empty">No comps found.</div>';
    return `<div class="tw"><table>
      <thead><tr><th>Photo</th><th>Address</th><th>Bed/Bath/SF</th><th>Lot</th><th>Dist</th><th>Sale Date</th><th>Price</th><th>$/SF</th><th>Buyer / Type</th><th>Condition</th><th>Links</th></tr></thead>

        <td>${photoCell(c.address)}</td>
        <td><strong>${f(c.address)}</strong></td>
        <td>${f(c.beds)}/${f(c.baths)}/${f(c.sf)} sf</td>
        <td>${f(c.lotSf)}</td><td>${f(c.distance)}</td><td>${f(c.saleDate)}</td>
        <td class="mono">${fm(c.price)}</td><td class="mono">${f(c.priceSF)}</td>
        <td>${btTag(c.buyerType)}<br><small style="color:var(--g4);font-size:10px">${f(c.buyerName)}</small></td>
        <td>${condTag(c.condition)}</td>
        <td><div class="src-links">
          <a href="https://www.zillow.com/homes/${encodeURIComponent(c.address||'')}_rb/" target="_blank" class="sl sl-z">Zillow ↗</a>
          <a href="https://www.redfin.com/FL/${encodeURIComponent(c.address||'')}" target="_blank" class="sl sl-r">Redfin ↗</a>
          <a href="https://www.google.com/maps/search/${encodeURIComponent(c.address||'')}" target="_blank" class="sl sl-g">Maps ↗</a>
        </div></td>
      </tr>`).join('')}</tbody></table></div>`;
  };
  const listRows = cs => {
    if (!cs?.length) return '<div class="empty">No listings found.</div>';
    return `<div class="tw"><table>
      <thead><tr><th>Photo</th><th>Address</th><th>Bed/Bath/SF</th><th>Dist</th><th>Listed</th><th>Price</th><th>$/SF</th><th>DOM</th><th>Condition</th><th>Links</th></tr></thead>
      <tbody>${cs.map(c => `<tr>
        <td>${photoCell(c.address)}</td>
        <td><strong>${f(c.address)}</strong></td>
        <td>${f(c.beds)}/${f(c.baths)}/${f(c.sf)} sf</td>
        <td>${f(c.distance)}</td><td>${f(c.listedDate)}</td>
        <td class="mono">${fm(c.listPrice)}</td><td class="mono">${f(c.priceSF)}</td><td>${f(c.dom)}</td>
        <td>${condTag(c.condition)}</td>
        <td><div class="src-links">
          <a href="https://www.zillow.com/homes/${encodeURIComponent(c.address||'')}_rb/" target="_blank" class="sl sl-z">Zillow ↗</a>
          <a href="https://www.redfin.com/FL/${encodeURIComponent(c.address||'')}" target="_blank" class="sl sl-r">Redfin ↗</a>
        </div></td>
      </tr>`).join('')}</tbody></table></div>`;
  };
  const rentRows = cs => {
    if (!cs?.length) return '<div class="empty">No rentals found.</div>';
    return `<div class="tw"><table>
      <thead><tr><th>Photo</th><th>Address</th><th>Bed/Bath/SF</th><th>Dist</th><th>Monthly Rent</th><th>$/SF/mo</th><th>DOM</th><th>Condition</th></tr></thead>
      <tbody>${cs.map(c => `<tr>
        <td>${photoCell(c.address)}</td>
        <td><strong>${f(c.address)}</strong></td>
        <td>${f(c.beds)}/${f(c.baths)}/${f(c.sf)} sf</td>
        <td>${f(c.distance)}</td>
        <td class="mono">${fm(c.monthlyRent)}</td><td class="mono">${f(c.rentSF)}</td>
        <td>${f(c.dom)}</td><td>${condTag(c.condition)}</td>
      </tr>`).join('')}</tbody></table></div>`;
  };

  setMain(`
  <div class="rh">
    <div>
      <div class="raddr">${p.address||addr}</div>
      <div class="rmeta">
        ${p._real?'<span style="color:#4ade80;font-size:10px;font-weight:700;background:rgba(74,222,128,.12);padding:2px 8px;border-radius:10px;margin-right:6px">✓ DealMachine Data</span>':''}

      </div>
    </div>
    <div class="ract">
      <button class="ba ba-ghost" onclick="window.print()">🖨 Print</button>
      <button class="ba ba-ghost" onclick="copyLink()">🔗 Copy Link</button>
      <button class="ba ba-save" onclick="saveNote()">💾 Save to DealMachine</button>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="cicon ci-b">🏠</div><div class="card-title">Subject property details</div>${p._real?'<span class="dm-badge">✓ DealMachine Live Data</span>':''}</div>
    <div style="display:grid;grid-template-columns:190px 1fr">
      <div style="padding:14px;border-right:1px solid var(--g3)">
        <img src="https://maps.googleapis.com/maps/api/streetview?size=180x135&location=${encodeURIComponent(p.address||addr)}"
          alt="" style="width:100%;height:130px;object-fit:cover;border-radius:8px;border:1px solid var(--g3);margin-bottom:8px" onerror="this.style.display='none'">
        <div class="src-links">
          <a href="https://www.zillow.com/homes/${encodeURIComponent(p.address||addr)}_rb/" target="_blank" class="sl sl-z">Zillow ↗</a>
          <a href="https://www.redfin.com/FL/${encodeURIComponent(p.address||addr)}" target="_blank" class="sl sl-r">Redfin ↗</a>
          <a href="https://www.google.com/maps/search/${encodeURIComponent(p.address||addr)}" target="_blank" class="sl sl-g">Maps ↗</a>
        </div>
      </div>
      <div class="pgrid">
        <div class="pc"><div class="pl">Owner</div><div class="pv">${f(p.owner)}</div></div>
        <div class="pc"><div class="pl">Square feet</div><div class="pv">${f(p.sf)} sf</div></div>
        <div class="pc"><div class="pl">Year built</div><div class="pv">${f(p.yearBuilt)}</div></div>
        <div class="pc"><div class="pl">Style</div><div class="pv">${f(p.style)}</div></div>
        <div class="pc"><div class="pl">Bed / Bath</div><div class="pv">${f(p.beds)} bd / ${f(p.baths)} ba</div></div>
        <div class="pc"><div class="pl">Lot size</div><div class="pv">${f(p.lotSize)}</div></div>
        <div class="pc"><div class="pl">Last sale</div><div class="pv">${f(p.lastSaleAmount)} <span style="color:var(--g4);font-size:11px">${f(p.lastSaleDate)}</span></div></div>
        <div class="pc"><div class="pl">Deed type</div><div class="pv">${f(p.deed)}</div></div>
        <div class="pc"><div class="pl">Est. value</div><div class="pv blue">${f(p.estimatedValue)}</div></div>
        <div class="pc"><div class="pl">Equity</div><div class="pv green">${f(p.equity)}</div></div>
        <div class="pc"><div class="pl">Mortgage balance</div><div class="pv">${f(p.mortgageBalance)}</div></div>
        <div class="pc"><div class="pl">Tax status</div><div class="pv ${(p.taxStatus||'').includes('DELINQUENT')?'red':''}">${f(p.taxStatus)}</div></div>
        <div class="pc"><div class="pl">Open liens</div><div class="pv">${f(p.openLiens)}</div></div>
        <div class="pc"><div class="pl">Distress</div><div class="pv"><span class="dpill">${f(p.distress)}</span></div></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="cicon ci-b">📊</div><div class="card-title">Comparables — 1 mile radius</div><div class="card-sub">Photos + links · LLC/Investor highlighted · Gemini AI</div></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('s6',this)">Sold 6 Mo <span class="tbadge">${(d.sold6||[]).length}</span></div>
      <div class="tab" onclick="switchTab('s12',this)">Sold 12 Mo <span class="tbadge">${(d.sold12||[]).length}</span></div>
      <div class="tab" onclick="switchTab('pend',this)">Pending <span class="tbadge">${(d.pending||[]).length}</span></div>
      <div class="tab" onclick="switchTab('sale',this)">For Sale <span class="tbadge">${(d.forSale||[]).length}</span></div>
      <div class="tab" onclick="switchTab('rent',this)">For Rent <span class="tbadge">${(d.forRent||[]).length}</span></div>
    </div>
    <div id="tp-s6" class="tab-pane active">${soldRows(d.sold6)}</div>
    <div id="tp-s12" class="tab-pane">${soldRows(d.sold12)}</div>
    <div id="tp-pend" class="tab-pane">${listRows(d.pending)}</div>
    <div id="tp-sale" class="tab-pane">${listRows(d.forSale)}</div>
    <div id="tp-rent" class="tab-pane">${rentRows(d.forRent)}</div>
    ${arv.activeInvestors?`<div class="ibar"><p>🏢 <strong>Active investors:</strong> ${arv.activeInvestors}</p></div>`:''}
    ${arv.notes?`<div class="nbar"><p>${arv.notes}</p></div>`:''}
  </div>

  <div class="card">
    <div class="card-head"><div class="cicon ci-g">📈</div><div class="card-title">ARV & market intelligence</div></div>
    <div class="agrid">
      <div class="ac"><div class="al">Avg $/SF (6 mo)</div><div class="av">${f(arv.avgPriceSF6mo)}</div></div>
      <div class="ac"><div class="al">Avg $/SF (12 mo)</div><div class="av">${f(arv.avgPriceSF12mo)}</div></div>
      <div class="ac"><div class="al">Estimated ARV</div><div class="av blue">${f(arv.estimatedARV)}</div></div>
      <div class="ac"><div class="al">ARV range</div><div class="av" style="font-size:13px">${f(arv.arvLow)} – ${f(arv.arvHigh)}</div></div>
      <div class="ac"><div class="al">Cash sale %</div><div class="av">${f(arv.cashSalePct)}</div></div>
      <div class="ac"><div class="al">Investor LLC %</div><div class="av orange">${f(arv.investorPct)}</div></div>
      <div class="ac"><div class="al">Dominant buyer</div><div class="av" style="font-size:13px">${f(arv.dominantBuyer)}</div></div>
      <div class="ac"><div class="al">Market trend</div><div class="av" style="font-size:13px">${f(arv.marketTrend)}</div></div>
      <div class="ac"><div class="al">Avg DOM</div><div class="av">${f(arv.avgDOM)}</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="cicon ci-o">🔨</div><div class="card-title">Estimated renovation costs</div><div class="card-sub">${f(r.sf)} SF · ${f(r.baths)} bath(s)</div></div>
    <table class="rtable">
      <thead><tr><th>Item</th><th>Formula</th><th>Calculation</th><th style="text-align:right">Cost</th></tr></thead>
      <tbody>
        <tr><td>New kitchen + appliances</td><td>$180 × 10% SF</td><td>$180 × ${Math.round((r.sf||0)*.1)}</td><td class="mono" style="text-align:right">$${(r.kitchen||0).toLocaleString()}</td></tr>
        <tr><td>New bathrooms ×${r.baths||1}</td><td>$110 × 3% SF × baths</td><td>$110 × ${Math.round((r.sf||0)*.03)} × ${r.baths||1}</td><td class="mono" style="text-align:right">$${(r.bathrooms||0).toLocaleString()}</td></tr>
        <tr><td>Painting (int/ext)</td><td>$6 × SF</td><td>$6 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.painting||0).toLocaleString()}</td></tr>
        <tr><td>New flooring</td><td>$11 × 80% SF</td><td>$11 × ${Math.round((r.sf||0)*.8)}</td><td class="mono" style="text-align:right">$${(r.flooring||0).toLocaleString()}</td></tr>
        <tr><td>New roof</td><td>$15 × SF</td><td>$15 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.roof||0).toLocaleString()}</td></tr>
        <tr><td>New A/C</td><td>$6.50 × SF</td><td>$6.50 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.ac||0).toLocaleString()}</td></tr>
        <tr><td>Cleaning</td><td>$1.50 × SF</td><td>$1.50 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.cleaning||0).toLocaleString()}</td></tr>
        <tr><td>Gardens / landscaping</td><td>$1.80 × SF</td><td>$1.80 × ${r.sf||0}</td><td class="mono" style="text-align:right">$${(r.gardens||0).toLocaleString()}</td></tr>
        <tr class="sub"><td colspan="3"><strong>Renovation subtotal</strong></td><td class="mono" style="text-align:right"><strong>$${(r.renovSubtotal||0).toLocaleString()}</strong></td></tr>
        <tr><td>Miscellaneous (5%)</td><td>5% of subtotal</td><td>5% × $${(r.renovSubtotal||0).toLocaleString()}</td><td class="mono" style="text-align:right">$${(r.misc||0).toLocaleString()}</td></tr>
        <tr><td>Permits &amp; related (3%)</td><td>3% of subtotal</td><td>3% × $${(r.renovSubtotal||0).toLocaleString()}</td><td class="mono" style="text-align:right">$${(r.permits||0).toLocaleString()}</td></tr>
        <tr><td>Hold cost (6 months)</td><td>$2 × SF × 6</td><td>$2 × ${r.sf||0} × 6</td><td class="mono" style="text-align:right">$${(r.holdCost||0).toLocaleString()}</td></tr>
        <tr><td>Real estate commission</td><td>6% × (ARV + renov)</td><td>6% × ($${arvN.toLocaleString()} + $${(r.renovSubtotal||0).toLocaleString()})</td><td class="mono" style="text-align:right">$${(r.commission||0).toLocaleString()}</td></tr>
        <tr class="tot"><td colspan="3"><strong>Total geral</strong></td><td class="mono" style="text-align:right;color:#7fb3ff"><strong>$${(r.totalGeral||0).toLocaleString()}</strong></td></tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-head"><div class="cicon ci-r">💰</div><div class="card-title">MAO — maximum allowable offer</div><div class="card-sub">ARV: ${f(arv.estimatedARV)} · All-in: $${rT.toLocaleString()}</div></div>
    <div class="maogrid">
      <div class="mc mc60"><div class="ml">60% — distressed / probate</div><div class="ma">${mao(.60)}</div><div class="md">ARV × 60% − all-in<br>Aggressive / deep wholesale</div></div>
      <div class="mc mc65"><div class="ml">65% — deep wholesale</div><div class="ma">${mao(.65)}</div><div class="md">ARV × 65% − all-in<br>Strong investor margin</div></div>
      <div class="mc mc70"><div class="ml">70% — standard wholesale</div><div class="ma">${mao(.70)}</div><div class="md">ARV × 70% − all-in<br>Flipper standard offer</div></div>
      <div class="mc mc75"><div class="ml">75% — light rehab</div><div class="ma">${mao(.75)}</div><div class="md">ARV × 75% − all-in<br>Best-case / tight margin</div></div>
    </div>
    <div class="nbar"><p><strong>Recommended range: ${mao(.65)} – ${mao(.70)}.</strong> ${arv.notes||''}</p></div>
  </div>`);
  window._report = { addr, data: d };
}

// ── LOADING ───────────────────────────────────────────────────────
function showLoading(addr) {
  stepIdx = -1;
  setMain(`<div class="loading"><div class="spin"></div><h3>Analyzing ${addr}</h3><p>DealMachine + Gemini AI</p>
    <div class="steps">${STEPS.map((s,i)=>`<div class="step" id="s${i}"><div class="step-dot"></div>${s}</div>`).join('')}</div>
  </div>`);
  advStep(0);
}
function advStep(i) {
  if (stepIdx >= 0) { const p = document.getElementById('s'+stepIdx); if (p) { p.className='step done'; p.innerHTML='<div class="step-dot"></div>✓ '+STEPS[stepIdx]; } }
  stepIdx = i;
  const c = document.getElementById('s'+i); if (c) c.className = 'step active';
}
function showErr(msg) {
  setMain(`<div class="loading"><div style="font-size:32px;margin-bottom:12px">⚠️</div><h3 style="color:var(--red)">Analysis failed</h3><p style="color:var(--red);margin-bottom:16px">${msg}</p><button style="background:var(--blue);color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer" onclick="doAnalyze()">Try Again</button></div>`);
}

// ── SAVE + COPY ───────────────────────────────────────────────────
async function saveNote() {
  if (!window._report || !activeLead) { alert('No report to save.'); return; }
  const { data: d } = window._report;
  const arv = d.arv||{}, r = d.renovation||{};
  const arvN = parseFloat(String(arv.estimatedARV||'0').replace(/[^0-9.]/g,''));
  const note = `=== 123SoldCash Wholesale Analysis ===\nDate: ${new Date().toLocaleDateString()}\nARV: ${arv.estimatedARV||'—'} (${arv.arvLow||'—'} – ${arv.arvHigh||'—'})\nAll-in: $${(r.totalGeral||0).toLocaleString()}\nMAO 60%: $${Math.round(arvN*.6-(r.totalGeral||0)).toLocaleString()}\nMAO 65%: $${Math.round(arvN*.65-(r.totalGeral||0)).toLocaleString()}\nMAO 70%: $${Math.round(arvN*.7-(r.totalGeral||0)).toLocaleString()}\nMarket: ${arv.marketTrend||'—'} | Investors: ${arv.investorPct||'—'}\nActive Investors: ${arv.activeInvestors||'None'}\nNotes: ${arv.notes||''}`;
  try {
    const fd = new FormData(); fd.append('note', note);
    const r2 = await fetch(`https://api.dealmachine.com/public/v1/leads/${activeLead.id}/create-note`, {
      method: 'POST', headers: { 'Authorization': `Bearer ${DM_KEY}` }, body: fd
    });
    if (!r2.ok) throw new Error('Failed');
    alert('✅ Saved to DealMachine!');
  } catch(e) { alert('Error: ' + e.message); }
}
function copyLink() {
  const a = document.getElementById('ain')?.value?.trim() || '';
  const url = location.origin + location.pathname + '?address=' + encodeURIComponent(a);
  navigator.clipboard.writeText(url).then(() => alert('Link copied!\n\n' + url)).catch(() => prompt('Copy:', url));
}
</script>
